title: LoRA (Low-Rank Adaptation)
tags: [lora, peft, method]
---

# LoRA: Low-Rank Adaptation

## 核心思想

LoRA 是一种 **参数高效微调 (PEFT)** 方法，核心假设是：预训练大模型在适配下游任务时，权重更新矩阵是 **低秩 (low-rank)** 的。

**数学形式：** W = W₀ + BA，其中 B ∈ R^{d×r}，A ∈ R^{r×k}，秩 r ≪ min(d,k)。

- W₀ 冻结，仅训练 A 和 B
- 推理时 BA 可合并回 W₀，**无额外推理延迟**

## 主要优势

| 维度 | 效果 |
|------|------|
| 可训练参数 | 减少 **10,000×**（vs GPT-3 175B 全量微调） |
| GPU 显存 | 降低 **3×** |
| 推理延迟 | **零**（可合并权重） |
| 多任务 | 只需换 LoRA 权重 |
| 性能 | 达到或超过全量微调 |

## 变体与衍生

- QLoRA — 量化 + LoRA，4-bit 精度下微调 65B 模型
- DoRA (2024) — 权重分解为幅度+方向
- AdaLoRA — 自适应分配秩

## 待解决问题

- 最优秩 r 的选择无通用准则
- 不同层对秩的需求不同
- 与 DPO 等对齐方法的结合仍在探索
`,

qlora: `---
title: QLoRA (Quantized LoRA)
tags: [lora, quantization, peft, method]
---

# QLoRA: Quantized Low-Rank Adaptation

## 核心思想

QLoRA 将 **4-bit 量化** 与 **LoRA** 结合，在单张 48GB 消费级 GPU 上微调 65B 参数模型。

## 三大创新

### 1. 4-bit NormalFloat (NF4)
针对正态分布权重信息论最优的 4-bit 数据类型，比标准格式精度更高。

### 2. Double Quantization（双重量化）
对量化常数自身再量化，进一步压缩内存。

### 3. Paged Optimizers（分页优化器）
类似 OS 分页机制，管理 GPU 显存尖峰，防止 OOM。

## Guanaco 模型家族

| 指标 | 结果 |
|------|------|
| Vicuna 基准 | 超越所有先前开源模型 |
| vs ChatGPT | **99.3%** |
| 训练成本 | 单 GPU 24 小时 |
| 微调模型数 | >1,000 个 |

## 关键发现

1. GPT-4 评估可作为人工评估的廉价替代
2. 现有 chatbot 基准不可信
3. 数据质量 > 数据数量

dpo: `---
title: DPO (Direct Preference Optimization)
tags: [dpo, rlhf, alignment, method]
---

# DPO: Direct Preference Optimization

## 核心思想

DPO 通过重新参数化 RLHF 中的奖励模型，**直接从偏好数据中优化策略**，将 RLHF 转化为 **简单的分类损失**。

> 核心洞察：语言模型本身就隐含了一个奖励函数，可提取最优策略的闭式解。

## 技术优势

| 维度 | RLHF (PPO) | DPO |
|------|-----------|-----|
| 奖励模型 | 需要单独训练 | **不需要** |
| 训练方式 | 强化学习 | **分类损失** |
| 稳定性 | 可能崩溃 | **稳定** |
| 计算开销 | 需采样生成 | **轻量** |

## 主要变体

- **IPO** — Identity Preference Optimization，解决过拟合
- **KTO** — 只需单边偏好
- **SimPO** — 用序列平均对数概率
- **Cal-DPO** — 校准的偏好优化 (NeurIPS 2024)

## 局限性

- 与 RLVR (GRPO) 相比，在数学/代码中可能不如 RL 方法
- 偏好数据质量仍是挑战

# RLHF

## 核心定义

RLHF 使用 **人类反馈替代工程化奖励函数**。起源于控制与机器人领域，在 LLM 对齐中取得突破。

## 标准流水线

1. **SFT** — 在高质量指令-回答对上微调
2. **Reward Model** — 训练打分模型
3. **PPO 优化** — RL 策略更新 + KL 散度惩罚

## 发展里程碑

| 事件 | 时间 | 意义 |
|------|------|------|
| PbRL 早期 | ~2017 | 偏好学习基础 |
| InstructGPT | 2022 | 大规模应用 |
| ChatGPT | 2022.11 | 商业化成功 |
| DPO 提出 | 2023.05 | RL-free 替代 |
| DeepSeek-R1 | 2025.01 | RLVR 崛起 |

## 统一策略梯度框架

Wang et al. (2024) 将预训练、SFT、RLHF、RLVR 统一到一个框架，分解为：Prompt 采样、Response 采样、梯度系数。

## 局限性

1. 奖励 hacking
2. 人类偏好噪声
3. 计算成本高
4. 分布偏移

| QLoRA | <1% | 无 |

1. 量化 + PEFT
2. 自动秩分配

# Synthetic Data

## 核心理念

用 LLM 生成 **人工但任务相关** 的训练样本，替代或补充真实数据。

### 1. Prompt-based
Self-Instruct, Alpaca, Evol-Instruct

检索真实样本引导生成

生成 → 评判 → 修正 → 再生成

|------|---------|

代码可通过执行反馈验证正确性（单元测试通过 = 正样本），这是文本领域不具备的。

// Simple markdown to HTML
function md2html(md) {
  let lines = md.split('\n');
  let html = '';
  let inTable = false, inCode = false, inList = false, listType = '';

  for (let i = 0; i < lines.length; i++) {
    let line = lines[i];

    // Skip YAML frontmatter
    if (line.trim() === '---' && (i === 0 || (html.trim() === '' && i < 10))) {
      while (i + 1 < lines.length && lines[i + 1].trim() !== '---') i++;
      i++; continue;
    }

    // Code blocks
    if (line.trim().startsWith('```')) {
      if (inCode) { html += '</code></pre>'; inCode = false; }
      else { html += '<pre><code>'; inCode = true; }
      continue;
    }
    if (inCode) { html += line + '\n'; continue; }

    // Tables
    if (line.trim().startsWith('|') && line.trim().endsWith('|')) {
      if (!inTable) { html += '<table>'; inTable = true; }
      let cells = line.split('|').filter((_,j) => j > 0 && j < line.split('|').length - 1);
      if (cells.every(c => /^[-:\s]+$/.test(c.trim()))) {
        // Separator row, skip
        continue;
      }
      let tag = (i > 0 && lines[i-1] && lines[i-1].trim().startsWith('|') &&
                 lines[i-1].split('|').filter((_,j) => j > 0 && j < lines[i-1].split('|').length - 1)
                 .every(c => /^[-:\s]+$/.test(c.trim()))) ? 'th' : 'td';
      html += '<tr>' + cells.map(c => `<${tag}>${inlineMd(c.trim())}</${tag}>`).join('') + '</tr>';
      continue;
    } else if (inTable) {
      html += '</table>';
      inTable = false;
    }

    // Headings
    if (line.match(/^#### (.+)/)) { html += `<h3>${inlineMd(RegExp.$1)}</h3>`; continue; }
    if (line.match(/^### (.+)/)) { html += `<h3>${inlineMd(RegExp.$1)}</h3>`; continue; }
    if (line.match(/^## (.+)/)) { html += `<h2>${inlineMd(RegExp.$1)}</h2>`; continue; }
    if (line.match(/^# (.+)/)) { html += `<h1>${inlineMd(RegExp.$1)}</h1>`; continue; }

    // Blockquote
    if (line.match(/^> (.+)/)) { html += `<blockquote>${inlineMd(RegExp.$1)}</blockquote>`; continue; }

    // HR
    if (line.trim() === '---' || line.trim() === '***') { html += '<hr>'; continue; }

    // Lists
    if (line.match(/^(\s*)- (.+)/)) {
      if (!inList || listType !== 'ul') { if(inList) html += `</${listType}>`; html += '<ul>'; inList = true; listType = 'ul'; }
      html += `<li>${inlineMd(RegExp.$2)}</li>`;
      continue;
    }
    if (line.match(/^(\s*)\d+\. (.+)/)) {
      if (!inList || listType !== 'ol') { if(inList) html += `</${listType}>`; html += '<ol>'; inList = true; listType = 'ol'; }
      html += `<li>${inlineMd(RegExp.$2)}</li>`;
      continue;
    }
    if (inList && line.trim() === '') { html += `</${listType}>`; inList = false; continue; }

    // Empty line
    if (line.trim() === '') { if (inList) { html += `</${listType}>`; inList = false; } html += '<br>'; continue; }

    // Paragraph
    if (inList) { html += `</${listType}>`; inList = false; }
    html += `<p>${inlineMd(line)}</p>`;
  }
  if (inTable) html += '</table>';
  if (inList) html += `</${listType}>`;
  return html;
}

function inlineMd(text) {
  return text
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>')
    .replace(/\[\[([^\]]+)\]\]/g, '<span class="wikilink">$1</span>');
}

function showDetail(id) {
  if (!contents[id]) return;
  let panel = document.getElementById('panel');
  let meta = contents[id].split('\n').filter(l => l.startsWith('title:') || l.startsWith('tags:'));

  document.getElementById('panel-title').textContent = meta.find(l=>l.startsWith('title:'))?.replace('title:','').trim() || id;
  let body = document.getElementById('panel-body');
  body.innerHTML = md2html(contents[id]);

  // Tags
  let tagsRaw = meta.find(l=>l.startsWith('tags:'))?.replace('tags:','').trim() || '';
  let tags = tagsRaw.replace(/[\[\]]/g,'').split(',').map(t=>t.trim()).filter(Boolean);
  if (tags.length) {
    body.innerHTML += '<div id="panel-tags">' + tags.map(t => `<span class="tag">${t}</span>`).join('') + '</div>';
  }

  panel.classList.add('show');
}

function closePanel() {
  document.getElementById('panel').classList.remove('show');
}

const data = {
  nodes: [
    {id:"lora", title:"LoRA", group:"concept", desc:"低秩分解微调 · 参数减少10,000× · 零推理延迟"},
    {id:"qlora", title:"QLoRA", group:"concept", desc:"4-bit量化LoRA · 单GPU微调65B · 达ChatGPT 99.3%"},
    {id:"dpo", title:"DPO", group:"concept", desc:"RL-free对齐 · 分类损失替代RL · 实现极简"},
    {id:"rlhf", title:"RLHF", group:"concept", desc:"人类反馈强化学习 · PPO优化 · InstructGPT起源"},
    {id:"instruction-tuning", title:"指令微调", group:"concept", desc:"(指令,回答)对训练 · 弥合预训练与指令跟随"},
    {id:"peft", title:"PEFT", group:"concept", desc:"参数高效微调总览 · 四大方法家族"},
    {id:"synthetic-data", title:"合成数据", group:"concept", desc:"LLM生成训练数据 · Distillation+Self-Improve"},
    {id:"preference-alignment", title:"偏好对齐", group:"concept", desc:"对齐全景 · RL→RL-free · 单目标→多目标"},
    {id:"rlhf-vs-dpo", title:"RLHF vs DPO", group:"comparison", desc:"方法选择指南 · 何时用PPO何时用DPO"},
    {id:"full-finetuning", title:"全参数微调", group:"external", desc:"更新全部参数 · LoRA对比基准"},
    {id:"quantization", title:"量化技术", group:"external", desc:"NF4/INT4/INT8 · QLoRA基石"},
    {id:"grpo", title:"GRPO", group:"external", desc:"Group Relative Policy Optimization · RLVR"},
    {id:"reward-modeling", title:"奖励模型", group:"external", desc:"偏好打分 · RLHF核心"},
    {id:"data-curation", title:"数据筛选", group:"external", desc:"质量过滤 · 后处理"},
  ],
  links: [
    {source:"lora",target:"qlora",label:"量化变体"},{source:"lora",target:"peft",label:"PEFT核心"},
    {source:"lora",target:"full-finetuning",label:"对比"},{source:"lora",target:"dpo",label:"结合对齐"},
    {source:"qlora",target:"peft",label:"量化+LoRA"},{source:"qlora",target:"quantization",label:"4-bit NF4"},
    {source:"dpo",target:"rlhf",label:"替代"},{source:"dpo",target:"preference-alignment",label:"RL-free"},
    {source:"dpo",target:"synthetic-data",label:"偏好数据"},{source:"dpo",target:"grpo",label:"RL对比"},
    {source:"rlhf",target:"preference-alignment",label:"RL范式"},{source:"rlhf",target:"instruction-tuning",label:"后SFT"},
    {source:"rlhf",target:"reward-modeling",label:"RM训练"},{source:"rlhf",target:"grpo",label:"演变"},
    {source:"instruction-tuning",target:"rlhf",label:"第一步"},{source:"instruction-tuning",target:"dpo",label:"前置"},
    {source:"instruction-tuning",target:"synthetic-data",label:"数据来源"},{source:"instruction-tuning",target:"lora",label:"高效实现"},
    {source:"peft",target:"instruction-tuning",label:"应用"},{source:"synthetic-data",target:"data-curation",label:"后处理"},
    {source:"preference-alignment",target:"rlhf-vs-dpo",label:"方法论"},
    {source:"rlhf-vs-dpo",target:"dpo",label:"详析"},{source:"rlhf-vs-dpo",target:"rlhf",label:"详析"},
  ]
};

const W=window.innerWidth, H=window.innerHeight;
const svg=d3.select("#graph").append("svg").attr("width",W).attr("height",H);
const g=svg.append("g");
svg.call(d3.zoom().scaleExtent([0.3,3]).on("zoom",(e)=>g.attr("transform",e.transform)));

const color=d3.scaleOrdinal().domain(["concept","comparison","external"]).range(["#58a6ff","#d29922","#8b949e"]);
const sim=d3.forceSimulation(data.nodes).force("link",d3.forceLink(data.links).id(d=>d.id).distance(140))
  .force("charge",d3.forceManyBody().strength(-400)).force("center",d3.forceCenter(W/2,H/2)).force("collide",d3.forceCollide(50));

const tooltip=d3.select("#tooltip");

g.append("defs").selectAll("marker").data(["concept","comparison","external"])
  .join("marker").attr("id",d=>"arrow-"+d).attr("viewBox","0 -5 10 10").attr("refX",22).attr("refY",0)
  .attr("markerWidth",6).attr("markerHeight",6).attr("orient","auto")
  .append("path").attr("d","M0,-5L10,0L0,5").attr("fill",d=>color(d)).attr("opacity",0.6);

const link=g.append("g").selectAll("line").data(data.links).join("line")
  .attr("stroke","#30363d").attr("stroke-width",1.5)
  .attr("marker-end",d=>`url(#arrow-${data.nodes.find(n=>n.id===d.target.id)?.group||"concept"})`);

const linkLabel=g.append("g").selectAll("text").data(data.links).join("text")
  .text(d=>d.label).attr("font-size",9).attr("fill","#484f58").attr("text-anchor","middle").attr("dy",-6);

const node=g.append("g").selectAll("g").data(data.nodes).join("g")
  .call(d3.drag().on("start",(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y})
    .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y}).on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));

node.append("circle").attr("r",d=>d.group==="concept"?16:d.group==="comparison"?14:10)
  .attr("fill",d=>color(d.group)).attr("stroke","#0d1117").attr("stroke-width",2)
  .on("click",function(e,d){showDetail(d.id);e.stopPropagation()})
  .on("mouseover",function(e,d){
    d3.select(this).transition().duration(200).attr("r",d.group==="concept"?22:d.group==="comparison"?19:14);
    link.attr("stroke",l=>l.source.id===d.id||l.target.id===d.id?"#58a6ff":"#30363d")
      .attr("stroke-width",l=>l.source.id===d.id||l.target.id===d.id?2.5:1.5);
    node.select("circle").attr("opacity",n=>{
      if(n.id===d.id)return 1;
      return data.links.some(l=>(l.source.id===d.id&&l.target.id===n.id)||(l.target.id===d.id&&l.source.id===n.id))?0.7:0.2;
    });
    tooltip.style("display","block").html(`<b>${d.title}</b><br><span style="color:#8b949e">${d.desc}</span>`);
  })
  .on("mousemove",e=>{tooltip.style("left",(e.pageX+12)+"px").style("top",(e.pageY-40)+"px")})
  .on("mouseout",function(){
    d3.select(this).transition().duration(200).attr("r",d=>d.group==="concept"?16:d.group==="comparison"?14:10);
    link.attr("stroke","#30363d").attr("stroke-width",1.5);
    node.select("circle").attr("opacity",1);
    tooltip.style("display","none");
  });

node.append("text").text(d=>d.title).attr("dy",d=>d.group==="concept"?28:d.group==="comparison"?24:20)
  .attr("text-anchor","middle").attr("fill","#c9d1d9").attr("font-size",d=>d.group==="concept"?11:d.group==="comparison"?10:9);

svg.on("click",()=>closePanel());

sim.on("tick",()=>{
  link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y).attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  linkLabel.attr("x",d=>(d.source.x+d.target.x)/2).attr("y",d=>(d.source.y+d.target.y)/2);
  node.attr("transform",d=>`translate(${d.x},${d.y})`);
});
</script>
</body>
</html>
