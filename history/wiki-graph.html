var C={};
  C["xia-dynasty"]="<h1>夏朝 (Xia Dynasty)</h1>\n<h2>概述</h2>\n<p>夏朝是中国传统史书中记载的第一个世袭王朝，与商、周合称\"三代\"。约存在于公元前 2070 年至前 1600 年，历时约 470 年。传统上认为由大禹（禹）或其子启建立，共传 14 代 17 王（一说 13 代 16 王）。</p>\n<h2>历史地位</h2>\n<ul><li>标志着中国从**部落联盟**向**世袭王朝**的过渡</li><li>开启了\"家天下\"的传统，取代了尧舜禹时代的\"禅让制\"</li><li>是中国青铜时代早期的重要阶段</li></ul>\n<h2>历史真实性争议</h2>\n<ul><li>**传统观点**：《史记·夏本纪》等文献记载了完整的夏王世系</li><li>**考古对应**：普遍认为**二里头文化**（河南偃师，约 1900–1500 BCE）可能与夏朝有关</li><li>二里头遗址发现了大型宫殿基址、青铜器作坊</li><li>但遗址中**未发现文字**，无法确证与文献中夏朝的对应关系</li><li>**西方学界**：多数将夏朝视为\"半传说\"（semi-legendary），认为尚缺乏直接考古证据</li></ul>\n<h2>关键事件与人物</h2>\n<table><tr><th>人物</th><th>事迹</th></tr><tr><td>**大禹**（禹）</td><td>治水有功，受舜禅让。传说划定九州，奠定夏朝基础</td></tr><tr><td>**启**</td><td>禹之子，废除禅让制，开启世袭王朝</td></tr><tr><td>**太康**</td><td>因失政被后羿夺取政权（\"太康失国\"）</td></tr><tr><td>**少康**</td><td>中兴夏朝，恢复夏后氏统治（\"少康中兴\"）</td></tr><tr><td>**桀**</td><td>末代君主，以暴虐著称，被商汤推翻</td></tr></table>\n<h2>灭亡</h2>\n<p>约公元前 1600 年，商部落首领汤联合各方国，在鸣条之战中击败夏桀，夏朝灭亡。商朝建立。</p>\n<h2>文化遗产</h2>\n<ul><li>二里头文化：中国最早的广域王权国家的考古证据</li><li>青铜礼器制度萌芽（爵、斝等酒器）</li><li>可能与后来的 [[zhou-dynasty]] \"夏礼\" 记忆有关</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[shang-dynasty]] — 继夏而起的商朝</li><li>[[erlitou-culture]] — 可能与夏朝对应的考古文化</li><li>[[bronze-age-china]] — 中国青铜文明</li></ul>\n<h2>参见</h2>\n<ul><li>[[pre-qin-timeline]] — 先秦时间线</li></ul>";
  C["shang-dynasty"]="<h1>商朝 (Shang Dynasty)</h1>\n<h2>概述</h2>\n<p>商朝是中国历史上<em>*第一个有直接文字记载（甲骨文）证实的王朝</em>*，存在约 554 年，传 17 代 31 王（一说 29 王）。由商汤在灭夏后建立，都城多次迁移，最终盘庚迁殷（安阳）后稳定下来。是东亚青铜文明的巅峰时期之一。</p>\n<h2>历史地位</h2>\n<ul><li>**第一个被考古确证的王朝**：1899 年发现甲骨文后获得文字证实</li><li>中国**文字史的起点**：甲骨文是目前最早的成熟汉字系统</li><li>青铜器铸造达到极高水准</li><li>奠定了中国王朝政治的基本模式</li></ul>\n<h2>王系与迁都</h2>\n<ul><li>**商汤**（成汤）：灭夏建商</li><li>**太甲**：伊尹放太甲于桐宫，三年后归政</li><li>**盘庚**：迁都于殷（安阳），此后不再迁都</li><li>**武丁**（约 1250–1192 BCE）：商朝鼎盛，\"武丁中兴\"</li><li>**帝辛**（纣王）：末代君主，被[[zhou-dynasty|周武王]]伐灭</li></ul>\n<h2>文化特征</h2>\n<h3>甲骨文</h3>\n<ul><li>刻在龟甲和兽骨上的占卜文字</li><li>记载祭祀、战争、天象、农业等</li><li>出土于殷墟，现存约 15 万片</li><li>已识别约 4,500 个单字，释读约 1,500 个</li></ul>\n<h3>青铜器</h3>\n<ul><li>**司母戊鼎**（后母戊鼎）：世界最大的青铜器，重 832.84 公斤</li><li>青铜礼器制度成熟：鼎、尊、爵、斝、觚等</li><li>失蜡法、范铸法技术精湛</li><li>青铜铭文（金文）为另一重要文字载体</li></ul>\n<h3>宗教</h3>\n<ul><li>祖先崇拜为核心</li><li>天帝（上帝）信仰</li><li>人殉制度普遍存在</li></ul>\n<h2>地理范围</h2>\n<p>商朝的核心区域在黄河中下游（今河南、河北南部、山东西部），影响力辐射至长江流域。同时期存在其他独立的青铜文明如 [[sanxingdui|三星堆]]（四川）。</p>\n<h2>军事</h2>\n<ul><li>车战为主，两马或四马战车</li><li>青铜武器：戈、矛、钺、箭镞</li><li>妇好（武丁配偶）为史上最早有记载的女将军</li></ul>\n<h2>灭亡</h2>\n<p>约公元前 1046 年，周武王联合八百诸侯，在<em>*牧野之战</em>*中击败商纣王。纣王自焚，商朝灭亡。</p>\n<blockquote>\"前徒倒戈\"——《尚书》记载商军前锋阵前倒戈，导致商朝迅速崩溃。</blockquote>\n<h2>相关条目</h2>\n<ul><li>[[xia-dynasty]] — 夏朝</li><li>[[zhou-dynasty]] — 周朝</li><li>[[oracle-bones]] — 甲骨文</li><li>[[bronze-age-china]] — 中国青铜文明</li><li>[[pre-qin-timeline]] — 先秦时间线</li></ul>";
  C["zhou-dynasty"]="<h1>周朝 (Zhou Dynasty)</h1>\n<h2>概述</h2>\n<p>周朝是中国历史上<em>*延续时间最长的王朝</em>*（约 790 年），分西周和东周两个阶段。西周（1046–771 BCE）都城镐京（今西安附近），以封建制度为统治基础；东周（770–256 BCE）迁都洛邑（洛阳），王室衰微，进入诸侯争霸的[[spring-autumn-period|春秋战国]]时代。</p>\n<h2>建国</h2>\n<p>周人起源于陕西渭水流域（今陕西岐山一带）。周武王（姬发）在牧野之战中击败商纣王，建立周朝。</p>\n<h2>核心制度与思想</h2>\n<h3>天命观</h3>\n<p>周人首次提出系统的<em>*天命</em>*思想，成为此后两千年中国政治合法性的核心理论。详见 [[mandate-of-heaven]]：</p>\n<ul><li>\"天命靡常\"——天命不固定于一家一姓</li><li>\"以德配天\"——君主必须有德才能保有天命</li><li>以商朝失德、周朝有德来解释改朝换代</li></ul>\n<h3>封建制度</h3>\n<p>周朝实行<em>*封土建国</em>*，将土地和人民分封给宗室子弟和功臣：</p>\n<ul><li>天子直接统治\"王畿\"</li><li>诸侯统治封国，对天子承担朝贡、从征等义务</li><li>诸侯下又封卿大夫</li><li>层层分封，形成金字塔式等级结构</li></ul>\n<p>详见 [[zhou-feudal-system|周代封建制]]</p>\n<h3>宗法制</h3>\n<p>以血缘关系为纽带的继承和权力分配制度：</p>\n<ul><li>嫡长子继承制</li><li>大宗（嫡系）与小宗（旁系）的等级关系</li><li>与封建制结合，形成\"家国同构\"的治理模式</li></ul>\n<h2>西周 → 东周的转折</h2>\n<table><tr><th>时期</th><th>时间</th><th>都城</th><th>特征</th></tr><tr><td>**西周**</td><td>1046–771 BCE</td><td>镐京</td><td>王室强大，封建秩序稳固</td></tr><tr><td>**东周**</td><td>770–256 BCE</td><td>洛邑</td><td>王室衰微，诸侯争霸</td></tr></table>\n<p><em>*关键事件</em><em>：公元前 771 年，犬戎攻破镐京，周幽王被杀（</em><em>烽火戏诸侯</em>*传说）。周平王东迁洛邑，西周结束。</p>\n<h2>东周时期</h2>\n<p>东周分为两个阶段：</p>\n<h3>[[spring-autumn-period|春秋时期]]（770–476 BCE）</h3>\n<ul><li>诸侯兼并，大国争霸</li><li>\"春秋五霸\"：齐桓公、晋文公、楚庄王、吴王阖闾、越王勾践（有争议）</li><li>各国改革，封建制度开始松动</li></ul>\n<h3>[[warring-states-period|战国时期]]（476–221 BCE）</h3>\n<ul><li>七雄并立：齐、楚、燕、韩、赵、魏、秦</li><li>变法运动：商鞅变法（秦）、李悝变法（魏）、吴起变法（楚）</li><li>百家争鸣，思想繁荣 → [[hundred-schools-of-thought|诸子百家]]</li><li>郡县制萌芽，封建制瓦解</li></ul>\n<h2>周朝的文化贡献</h2>\n<ul><li>《诗经》《尚书》《周易》等经典成书</li><li>[[bronze-age-china|青铜文化]] 从礼器向铭文发展（长篇金文）</li><li>奠定了中国文化的基本价值体系（礼乐文明）</li><li>诸子百家思想源头</li></ul>\n<h2>灭亡</h2>\n<p>公元前 256 年，秦灭东周，周朝正式终结。公元前 221 年，秦始皇最终统一六国。</p>\n<h2>相关条目</h2>\n<ul><li>[[xia-dynasty]] — 夏朝</li><li>[[shang-dynasty]] — 商朝</li><li>[[spring-autumn-period]] — 春秋时期</li><li>[[warring-states-period]] — 战国时期</li><li>[[mandate-of-heaven]] — 天命观</li><li>[[zhou-feudal-system]] — 周代封建制</li><li>[[hundred-schools-of-thought]] — 诸子百家</li><li>[[pre-qin-timeline]] — 先秦时间线</li></ul>";
  C["spring-autumn"]="<h1>春秋时期</h1>\n<h2>概述</h2>\n<p>春秋时期（770–476 BCE）因孔子编纂的鲁国史书《春秋》而得名，是东周的前半段。这一时期周王室权威衰落，诸侯国互相兼并，大国争霸，是中国从<em>*封建分权</em><em>向</em><em>中央集权</em>*过渡的重要阶段。</p>\n<h2>时代特征</h2>\n<table><tr><th>特征</th><th>说明</th></tr><tr><td>政治</td><td>王室衰微，\"礼乐征伐自诸侯出\"</td></tr><tr><td>军事</td><td>车战为主，战争规模较小，\"不鼓不成列\"等战礼尚存</td></tr><tr><td>经济</td><td>铁器开始使用，牛耕推广</td></tr><tr><td>文化</td><td>私学兴起（孔子），士阶层崛起，诸子百家萌芽</td></tr><tr><td>国际</td><td>诸侯会盟频繁，霸权政治（尊王攘夷）</td></tr></table>\n<h2>春秋五霸</h2>\n<p>五霸人选有争议，最常见版本：</p>\n<table><tr><th>霸主</th><th>国家</th><th>在位</th><th>主要事迹</th></tr><tr><td>**齐桓公**</td><td>齐</td><td>685–643 BCE</td><td>任用管仲改革，首霸中原，\"尊王攘夷\"</td></tr><tr><td>**晋文公**</td><td>晋</td><td>636–628 BCE</td><td>城濮之战败楚，确立晋国霸权</td></tr><tr><td>**楚庄王**</td><td>楚</td><td>613–591 BCE</td><td>\"问鼎中原\"，邲之战败晋</td></tr><tr><td>**吴王阖闾**</td><td>吴</td><td>514–496 BCE</td><td>用伍子胥、孙武，破楚入郢</td></tr><tr><td>**越王勾践**</td><td>越</td><td>496–465 BCE</td><td>\"卧薪尝胆\"，灭吴称霸</td></tr></table>\n<blockquote>另一说以秦穆公、宋襄公替代吴王、越王</blockquote>\n<h2>重要战役</h2>\n<table><tr><th>战役</th><th>年份</th><th>交战方</th><th>结果</th></tr><tr><td>长勺之战</td><td>684 BCE</td><td>鲁 vs 齐</td><td>鲁国曹刿以弱胜强（\"一鼓作气\"）</td></tr><tr><td>城濮之战</td><td>632 BCE</td><td>晋 vs 楚</td><td>晋文公确立霸权</td></tr><tr><td>崤之战</td><td>627 BCE</td><td>秦 vs 晋</td><td>秦东进受阻</td></tr><tr><td>邲之战</td><td>597 BCE</td><td>楚 vs 晋</td><td>楚庄王称霸</td></tr><tr><td>鄢陵之战</td><td>575 BCE</td><td>晋 vs 楚</td><td>晋复振</td></tr><tr><td>柏举之战</td><td>506 BCE</td><td>吴 vs 楚</td><td>吴军破楚都郢</td></tr></table>\n<h2>社会变革</h2>\n<ul><li>**井田制瓦解**：土地私有化趋势出现</li><li>**成文法出现**：郑国子产\"铸刑书\"（536 BCE），晋国\"铸刑鼎\"（513 BCE）</li><li>**士阶层崛起**：贵族制度松动，人才流动增加</li><li>**郡县制萌芽**：楚、晋等国开始设县，由国君直接委派官员</li></ul>\n<h2>重要思想人物</h2>\n<ul><li>**管仲**（？–645 BCE）：齐国改革家，\"仓廪实而知礼节\"</li><li>**子产**（？–522 BCE）：郑国改革家，外交家</li><li>**[[confucius|孔子]]**（551–479 BCE）：儒家创始人，编《春秋》</li><li>**[[laozi|老子]]**（约 6 世纪 BCE）：道家创始人</li><li>**[[sun-tzu|孙武]]**（约 6 世纪 BCE）：兵家，《孙子兵法》</li></ul>\n<h2>与战国的过渡</h2>\n<p>公元前 481 年，齐国田氏弑君（田氏代齐），标志着大夫专权达到顶峰。公元前 453 年，晋国韩、赵、魏三家灭智氏，开启战国序幕。春秋-战国的分界点有不同说法（前 481 年、前 476 年、前 453 年、前 403 年）。</p>\n<h2>相关条目</h2>\n<ul><li>[[zhou-dynasty]] — 周朝全貌</li><li>[[warring-states-period]] — 战国时期</li><li>[[confucius]] — 孔子</li><li>[[spring-autumn-annals]] — 《春秋》</li><li>[[pre-qin-timeline]] — 先秦时间线</li></ul>";
  C["warring-states"]="<h1>战国时期</h1>\n<h2>概述</h2>\n<p>战国时期（476–221 BCE）是中国从分裂走向统一的关键阶段，也是先秦思想文化的鼎盛期。七雄并立，变法图强，百家争鸣，最终秦国横扫六合，建立中国第一个大一统帝国。</p>\n<h2>七雄格局</h2>\n<table><tr><th>国家</th><th>核心区域（今）</th><th>都城</th><th>兴衰特征</th></tr><tr><td>**秦**</td><td>陕西、甘肃</td><td>咸阳</td><td>商鞅变法后最强大，最终统一六国</td></tr><tr><td>**楚**</td><td>湖北、湖南、安徽</td><td>郢→陈→寿春</td><td>疆域最广，文化独特（楚辞）</td></tr><tr><td>**齐**</td><td>山东</td><td>临淄</td><td>经济文化中心，稷下学宫</td></tr><tr><td>**燕**</td><td>北京、河北北部</td><td>蓟</td><td>偏远北方，荆轲刺秦</td></tr><tr><td>**韩**</td><td>河南中部</td><td>新郑</td><td>最弱小，最先被秦灭（230 BCE）</td></tr><tr><td>**赵**</td><td>河北、山西</td><td>邯郸</td><td>胡服骑射改革，长平之战惨败</td></tr><tr><td>**魏**</td><td>河南东部、山西南部</td><td>大梁</td><td>战国前期最强，后衰落</td></tr></table>\n<h2>变法运动</h2>\n<p>战国各国竞相改革，是\"变法\"概念与实际操作最集中的时代：</p>\n<table><tr><th>变法</th><th>国家</th><th>主持者</th><th>核心内容</th></tr><tr><td>**李悝变法**</td><td>魏</td><td>李悝</td><td>最早变法，废除世卿世禄，著《法经》</td></tr><tr><td>**吴起变法**</td><td>楚</td><td>吴起</td><td>削减贵族特权，整顿吏治</td></tr><tr><td>**商鞅变法**</td><td>秦</td><td>商鞅</td><td>最彻底：废井田开阡陌、军功爵制、什伍连坐、统一度量衡</td></tr><tr><td>**申不害变法**</td><td>韩</td><td>申不害</td><td>强调\"术\"治，驾驭群臣</td></tr><tr><td>**赵武灵王改革**</td><td>赵</td><td>赵武灵王</td><td>胡服骑射，军事改革</td></tr></table>\n<h2>重要战役</h2>\n<table><tr><th>战役</th><th>年份</th><th>交战方</th><th>结果与影响</th></tr><tr><td>桂陵之战</td><td>354 BCE</td><td>齐 vs 魏</td><td>孙膑\"围魏救赵\"</td></tr><tr><td>马陵之战</td><td>342 BCE</td><td>齐 vs 魏</td><td>庞涓自杀，魏国衰落</td></tr><tr><td>伊阙之战</td><td>293 BCE</td><td>秦 vs 韩魏</td><td>白起斩首 24 万</td></tr><tr><td>长平之战</td><td>260 BCE</td><td>秦 vs 赵</td><td>白起坑杀赵卒 40 万，赵国从此一蹶不振</td></tr><tr><td>邯郸之战</td><td>257 BCE</td><td>赵+魏+楚 vs 秦</td><td>信陵君窃符救赵</td></tr></table>\n<h2>百家争鸣</h2>\n<p>战国是[[hundred-schools-of-thought|诸子百家]]的鼎盛期，主要思想流派：</p>\n<ul><li>**儒家**：孟子（性善论、仁政）、荀子（性恶论、礼法结合）</li><li>**道家**：庄子（逍遥游、齐物论）</li><li>**墨家**：墨子（兼爱、非攻、尚贤）</li><li>**法家**：[[han-fei|韩非]]（法术势结合）、商鞅、李斯</li><li>**纵横家**：苏秦（合纵）、张仪（连横）</li><li>**兵家**：孙膑、吴起</li><li>**阴阳家**：邹衍（五德终始说）</li></ul>\n<h2>社会变革</h2>\n<ul><li>**铁器普及**：铁制农具和武器全面替代青铜</li><li>**土地私有**：商鞅\"废井田开阡陌\"标志着土地私有制正式确立</li><li>**郡县制推广**：取代封建制，成为秦统一后的基本行政制度</li><li>**人口流动**：士人游说列国，人才跨国流动频繁</li></ul>\n<h2>走向统一</h2>\n<ul><li>前 256 年：秦灭东周</li><li>前 230 年：灭韩</li><li>前 228 年：灭赵</li><li>前 225 年：灭魏</li><li>前 223 年：灭楚</li><li>前 222 年：灭燕</li><li>前 221 年：灭齐 → 六国尽灭，秦统一天下</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[spring-autumn-period]] — 春秋时期</li><li>[[qin-dynasty]] — 秦朝</li><li>[[hundred-schools-of-thought]] — 诸子百家</li><li>[[shang-yang-reforms]] — 商鞅变法</li><li>[[seven-warring-states]] — 战国七雄</li><li>[[han-fei]] — 韩非子</li><li>[[pre-qin-timeline]] — 先秦时间线</li></ul>";
  C["state-qi"]="<h1>齐国 (Qi)</h1>\n<h2>概述</h2>\n<p>齐国是西周开国功臣<em>*姜太公（姜尚/吕尚）</em><em>的封国，都</em><em>临淄</em><em>（今山东淄博）。春秋时期在[[spring-autumn-period|齐桓公]]和管仲的治理下成为</em><em>春秋首霸</em>*，战国时为七雄之一。公元前 221 年被秦所灭。</p>\n<h2>地理位置</h2>\n<p>以今山东省北部为中心，东临大海，拥有鱼盐之利。临淄是当时东方最大的都市，《战国策》记载\"临淄之中七万户\"。</p>\n<h2>春秋时期：霸业之路</h2>\n<h3>管仲改革（约前 685 BCE）</h3>\n<p>齐桓公即位后，不计前嫌任用管仲为相，推行全面改革：</p>\n<table><tr><th>领域</th><th>改革内容</th></tr><tr><td>**政治**</td><td>\"叁其国而伍其鄙\"——国（都城）分 21 乡，野（农村）分 5 属，加强行政管理</td></tr><tr><td>**军事**</td><td>\"作内政而寄军令\"——寓兵于民，军政合一</td></tr><tr><td>**经济**</td><td>\"官山海\"——盐铁国家专卖；\"相地而衰征\"——按土地好坏征税</td></tr><tr><td>**外交**</td><td>**\"尊王攘夷\"**——借助周天子名义团结诸侯，抵抗戎狄</td></tr></table>\n<h3>齐桓公称霸</h3>\n<ul><li>**前 679 年**：鄄之会，齐桓公首次成为公认霸主</li><li>**前 656 年**：召陵之盟，率八国联军伐楚，迫使楚国承认周天子权威</li><li>**前 651 年**：葵丘之会，霸业达到顶峰，周天子派使者赐胙</li><li>管仲和齐桓公相继去世后，齐国霸业迅速衰落，陷入内乱</li></ul>\n<h2>战国时期</h2>\n<ul><li>田氏代齐（前 386 年）：田氏家族取代姜姓成为国君</li><li>稷下学宫：齐威王、齐宣王时期建立，成为战国学术中心</li><li>与秦并称\"东西二帝\"（前 288 年）</li><li>前 284 年：燕将乐毅率五国联军破齐，齐国几乎亡国</li><li>田单复国后元气大伤，最终在前 221 年被秦灭</li></ul>\n<h2>文化贡献</h2>\n<ul><li>《管子》：虽托名管仲，反映齐法家思想</li><li>稷下学宫：汇聚[[hundred-schools-of-thought|诸子百家]]，荀子三为祭酒</li><li>齐地学术重实用，与鲁地重礼乐形成对比</li><li>阴阳五行、黄老之学与齐地渊源深厚</li></ul>\n<h2>关键人物</h2>\n<ul><li>**姜太公**：开国君主，兵家先驱，\"太公钓鱼\"</li><li>**管仲**：改革家，被诸葛亮自比</li><li>**鲍叔牙**：以知人著称，\"管鲍之交\"</li><li>**齐桓公**：春秋首霸</li><li>**晏婴**（晏子）：春秋后期贤相，外交家</li><li>**孙膑**：战国军事家（孙武后代），桂陵、马陵之战</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[spring-autumn-period]] — 春秋时代</li><li>[[state-jin]] — 晋国（主要竞争对手）</li><li>[[state-chu]] — 楚国</li><li>[[state-lu]] — 鲁国（邻国，\"齐鲁\"）</li><li>[[guan-zhong]] — 管仲</li></ul>";
  C["state-jin"]="<h1>晋国 (Jin)</h1>\n<h2>概述</h2>\n<p>晋国是周武王之子、周成王之弟叔虞的封国，姬姓。春秋时期为<em>*北方第一强国</em><em>，[[spring-autumn-period|晋文公]]称霸后长期主导中原政局。但因其独特的</em><em>六卿制度</em><em>，最终被韩、赵、魏三家瓜分（</em><em>三家分晋</em>*），成为春秋向战国过渡的标志性事件。</p>\n<h2>地理</h2>\n<p>核心区域在今山西省，有太行山、黄河之险，\"表里山河\"，易守难攻。先后都于<em>*绛</em><em>（翼城）、</em><em>新田</em>*（侯马）。</p>\n<h2>霸业之路</h2>\n<h3>早期扩张</h3>\n<ul><li>晋献公（前 676–651 BCE）：\"并国十七，服国三十八\"，大规模扩张</li><li>骊姬之乱导致公子重耳（后来的晋文公）流亡 19 年</li></ul>\n<h3>晋文公称霸</h3>\n<ul><li>前 636 年：在秦穆公帮助下回国即位，时年 62 岁</li><li>**城濮之战**（前 632 BCE）：以退避三舍履行诺言，大败楚军，一举称霸</li><li>践土之盟：周天子册封为侯伯</li><li>设**三军六卿**制度，由卿大夫掌握军政大权</li></ul>\n<h3>长期霸权</h3>\n<p>晋国在春秋中期长期压制楚国，维持了约 100 年的霸业：</p>\n<ul><li>崤之战（前 627 BCE）：伏击秦军，阻断秦东进之路</li><li>鄢陵之战（前 575 BCE）：再次击败楚国</li><li>弭兵之会（前 546 BCE）：晋楚两大阵营达成和平</li></ul>\n<h2>六卿制度与分裂</h2>\n<h3>卿族坐大</h3>\n<p>晋国不信任公族（国君宗亲），重用异姓卿大夫，导致卿族势力逐渐超越公室：</p>\n<ul><li>起初：十多个卿族 → 淘汰至六卿（范、中行、智、赵、魏、韩）</li><li>前 490 年：范氏、中行氏被灭 → 四卿（智、赵、魏、韩）</li><li>前 453 年：赵、魏、韩联合灭智氏，瓜分晋国土地</li><li>前 403 年：周威烈王正式册封赵、魏、韩为诸侯（战国开端）</li><li>前 376 年：三家废晋静公，晋国彻底灭亡</li></ul>\n<blockquote>司马光以三家分晋为《资治通鉴》开篇，视之为礼崩乐坏的标志性事件。</blockquote>\n<h2>制度特点</h2>\n<ul><li>**无公族制度**：自晋献公\"尽逐群公子\"后，晋国排斥公族参与政治</li><li>**卿大夫执政**：军政大权掌握在六卿手中，国君逐渐被架空</li><li>**郡县制萌芽**：新征服地区不封给卿大夫，而是设县由国君直辖</li></ul>\n<h2>与秦、楚的关系</h2>\n<ul><li>**对秦**：崤之战后长期封锁秦东进；但秦最终崛起</li><li>**对楚**：城濮、鄢陵两次大战确立对楚优势；弭兵会后形成晋楚双极格局</li><li>**联合制楚**：联吴制楚，扶植吴国从东南牵制楚国</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[spring-autumn-period]] — 春秋时代</li><li>[[state-qi]] — 齐国</li><li>[[state-chu]] — 楚国</li><li>[[state-qin]] — 秦国</li><li>[[warring-states-period]] — 战国（三家分晋后的韩赵魏）</li></ul>";
  C["state-chu"]="<h1>楚国 (Chu)</h1>\n<h2>概述</h2>\n<p>楚国起源于商朝时期的南方部落，周成王时正式受封（子爵），但自称\"我蛮夷也，不与中国之号谥\"。楚国是春秋战国时期<em>*疆域最广</em>*的诸侯国，文化独特，长期与中原抗衡。[[spring-autumn-period|楚庄王]]为春秋五霸之一。</p>\n<h2>地理</h2>\n<p>核心区域在长江中游（今湖北、湖南），鼎盛时疆域东至大海，南抵五岭，西包巴蜀，北达河南。\"楚地千里\"，地广人稀，物产丰富。</p>\n<h2>文化特质</h2>\n<h3>\"亦夷亦夏\"的双重身份</h3>\n<ul><li>被中原视为\"蛮夷\"，但主动学习和吸收中原文化</li><li>自称王（周天子才称王），挑战周天子权威</li><li>独特的**楚文化**：楚辞、巫风、凤鸟崇拜、漆器、丝织</li></ul>\n<h3>楚文化对中华文明的贡献</h3>\n<ul><li>**《楚辞》**：屈原《离骚》《九歌》，浪漫主义文学的源头</li><li>**道家渊源**：[[laozi|老子]]为楚人（一说陈人）</li><li>青铜器、漆器、丝织品技艺精湛</li><li>\"筚路蓝缕，以启山林\"的开拓精神</li></ul>\n<h2>政治军事</h2>\n<h3>早期</h3>\n<ul><li>熊绎受封于周成王，地位卑下（子爵）</li><li>周昭王南征楚国，死于汉水（\"昭王南征而不复\"）</li></ul>\n<h3>春秋时期</h3>\n<ul><li>**楚武王**（前 740–690 BCE）：第一个称王的楚君，\"欲以观中国之政\"</li><li>**楚成王**：与齐桓公召陵之盟；败于城濮之战</li><li>**楚庄王**（前 613–591 BCE）：</li><li>\"一鸣惊人\"的典故主角</li><li>**问鼎中原**——向周天子使者询问九鼎轻重</li><li>**邲之战**（前 597 BCE）：大败晋军，成就霸业</li><li>被后世列为\"春秋五霸\"之一</li></ul>\n<h3>逐渐衰落</h3>\n<ul><li>鄢陵之战（前 575 BCE）再败于晋</li><li>吴国入侵（前 506 BCE）：吴军破楚都郢，楚国几乎亡国（伍子胥复仇）</li><li>战国时期虽为七雄之一，但政治保守，屡败于秦</li><li>前 223 年被秦将王翦所灭</li></ul>\n<h2>政治制度特点</h2>\n<ul><li>王权较强，公族势力大，与晋国的卿族坐大形成对比</li><li>设\"令尹\"为最高官职（相当于相）</li><li>县制由楚国首创，灭国后直接设县</li><li>贵族势力强大，吴起变法（前 4 世纪）试图削弱贵族、提振军力，但吴起被杀后改革终止</li></ul>\n<h2>关键人物</h2>\n<ul><li>**楚庄王**：春秋五霸之一</li><li>**孙叔敖**：楚庄王时期贤相，修建水利工程芍陂</li><li>**伍子胥**：楚人逃亡吴国，助吴破楚复仇</li><li>**屈原**：战国末期楚国贵族、诗人，投汨罗江</li><li>**春申君（黄歇）**：战国四公子之一</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[spring-autumn-period]] — 春秋时代</li><li>[[state-qi]] — 齐国</li><li>[[state-jin]] — 晋国</li><li>[[state-wu]] — 吴国</li><li>[[state-yue]] — 越国</li><li>[[qu-yuan]] — 屈原</li></ul>";
  C["state-qin"]="<h1>秦国 (Qin)</h1>\n<h2>概述</h2>\n<p>秦国起源于陇西（今甘肃东部），早期为周王室的附庸，因护送周平王东迁有功正式封为诸侯（前 770 BCE）。在春秋时期被中原诸侯视为\"西戎\"，但逐步崛起，至战国时期成为最强国家，最终于前 221 年统一六国。</p>\n<h2>地理</h2>\n<p>早期偏处西陲（今甘肃天水→陕西关中），\"僻在雍州，不与中国诸侯之会盟\"。夺得周故地岐、丰后拥有沃野千里的关中平原，进可攻退可守。</p>\n<h2>春秋时期</h2>\n<h3>秦穆公称霸西戎</h3>\n<ul><li>秦穆公（前 659–621 BCE）：春秋五霸之一（有争议）</li><li>任用百里奚（\"五羖大夫\"）、蹇叔等贤臣</li><li>\"益国十二，开地千里，遂霸西戎\"</li><li>**崤之战**（前 627 BCE）：因企图东进中原遭晋伏击惨败，此后长期被晋封锁</li><li>秦晋之好：与晋国建立婚姻联盟（但屡次破裂）</li></ul>\n<h3>春秋中后期</h3>\n<ul><li>秦晋长期在河西（黄河以西）拉锯</li><li>国内政治相对稳定，公族势力有限</li><li>不被中原主流文化接纳，但也因此较少卷入中原纷争</li></ul>\n<h2>战国时期：从偏安到最强</h2>\n<h3>秦孝公与商鞅变法（前 356 BCE）</h3>\n<p>这是中国古代<em>*最彻底、影响最深远</em>*的变法：</p>\n<table><tr><th>领域</th><th>改革内容</th></tr><tr><td>**政治**</td><td>推行县制；编定户籍，什伍连坐；统一度量衡</td></tr><tr><td>**军事**</td><td>二十等爵制，**以军功授爵**——\"宗室非有军功，不得为属籍\"</td></tr><tr><td>**经济**</td><td>\"废井田，开阡陌\"——正式承认土地私有；重农抑商</td></tr><tr><td>**社会**</td><td>分户令，强制成年男子分家；移风易俗</td></tr></table>\n<blockquote>商鞅变法的结果是\"秦民大悦，道不拾遗，山无盗贼，家给人足\"——使秦国从落后边陲变为效率极高的战争机器。</blockquote>\n<h3>统一之路</h3>\n<ul><li>司马错取巴蜀（前 316 BCE）：获得战略纵深和资源基地</li><li>范雎提出\"**远交近攻**\"战略</li><li>白起伊阙之战（前 293 BCE）、长平之战（前 260 BCE）奠定军事霸权</li><li>嬴政（前 247 BCE 即位）在李斯辅佐下发动统一战争：</li><li>灭韩（前 230）→ 灭赵（前 228）→ 灭魏（前 225）→ 灭楚（前 223）→ 灭燕（前 222）→ 灭齐（前 221）</li></ul>\n<h2>成功原因</h2>\n<ol><li>**地理位置**：关中四塞之地，易守难攻</li><li>**制度优势**：商鞅变法最彻底，建立了高效的国家机器</li><li>**人才引进**：大量使用外来人才（百里奚、商鞅、张仪、范雎、李斯均为\"外国人\"）</li><li>**战略得当**：远交近攻，逐个击破</li></ol>\n<h2>相关条目</h2>\n<ul><li>[[spring-autumn-period]] — 春秋时代</li><li>[[warring-states-period]] — 战国时代</li><li>[[state-jin]] — 晋国（长期对手）</li><li>[[state-chu]] — 楚国（最大对手）</li><li>[[qin-dynasty]] — 秦朝（统一后）</li><li>[[shang-yang]] — 商鞅</li></ul>";
  C["state-lu"]="<h1>鲁国 (Lu)</h1>\n<h2>概述</h2>\n<p>鲁国是周公旦（周武王之弟）的封国，姬姓。周公因辅佐成王未就封，由长子伯禽代为就国。虽然国力不如齐、晋、楚等大国，但鲁国是<em>*周礼保存最完整的国家</em>*，被誉为\"礼乐之邦\"。[[confucius|孔子]]即生于鲁国。</p>\n<h2>地理</h2>\n<p>都城曲阜（今山东曲阜），核心区域在今山东西南部。\"齐鲁\"并称，鲁在泰山之南，齐在泰山之北。</p>\n<h2>文化地位</h2>\n<h3>周礼的最后堡垒</h3>\n<blockquote>\"周礼尽在鲁矣\"——韩宣子</blockquote>\n<ul><li>鲁国因周公的特殊地位，享有使用天子礼乐的特权</li><li>礼乐制度保存最为完整，成为各国学习周礼的范本</li><li>春秋末期面对\"礼崩乐坏\"，鲁国是最后的坚守者</li></ul>\n<h3>孔子与儒学</h3>\n<ul><li>孔子（前 551–479 BCE）生于鲁国陬邑</li><li>曾任鲁国中都宰、司空、大司寇</li><li>夹谷之会（前 500 BCE）：孔子以礼挫败齐国阴谋</li><li>晚年编《春秋》，整理六经</li><li>儒学以鲁文化为根基，后经汉武帝独尊成为中华文化正统</li></ul>\n<h2>政治特点</h2>\n<ul><li>**三桓专政**：春秋后期，鲁国政权被孟孙、叔孙、季孙三家公族（均为鲁桓公后裔）把持</li><li>\"三桓\"各有私邑、私兵，国君形同虚设</li><li>孔子\"堕三都\"试图削弱三桓势力，失败</li><li>**公族势力强大**：与晋国的异姓卿族不同，鲁国权力斗争主要在公族内部</li><li>内政混乱，外部受制于齐、晋，始终未成为强国</li></ul>\n<h2>时间线</h2>\n<table><tr><th>年代</th><th>事件</th></tr><tr><td>前 1046</td><td>周公受封，伯禽就国</td></tr><tr><td>前 684</td><td>长勺之战，曹刿以弱胜强败齐</td></tr><tr><td>前 551</td><td>孔子出生</td></tr><tr><td>前 500</td><td>夹谷之会</td></tr><tr><td>前 498</td><td>孔子堕三都</td></tr><tr><td>前 479</td><td>孔子去世</td></tr><tr><td>前 256</td><td>鲁被楚所灭（同年秦灭东周）</td></tr></table>\n<h2>历史意义</h2>\n<p>鲁国虽小，但其文化影响力远超政治军事地位：</p>\n<ul><li>《春秋》《诗经》《尚书》等经典多与鲁国有关</li><li>儒学以鲁为根基，影响东亚两千年</li><li>\"齐鲁文化\"成为山东的文化底色</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[spring-autumn-period]] — 春秋时代</li><li>[[state-qi]] — 齐国（邻国，\"齐鲁\"）</li><li>[[confucius]] — 孔子</li><li>[[hundred-schools-of-thought]] — 诸子百家</li></ul>";
  C["state-wu"]="<h1>吴国 (Wu)</h1>\n<h2>概述</h2>\n<p>吴国是春秋后期崛起于长江下游的强国，在<em>*吴王阖闾</em><em>和</em><em>夫差</em>*时期达到鼎盛，一度成为中原霸主。但其霸业仅持续两代便迅速衰落，于前 473 年被[[state-yue|越国]]灭亡。</p>\n<h2>地理</h2>\n<p>核心区域在今江苏省南部和浙江省北部。都城先在梅里，后迁至<em>*姑苏</em>*（今苏州）。</p>\n<h2>崛起之路</h2>\n<h3>吴王寿梦（前 585–561 BCE）</h3>\n<ul><li>吴国第 19 代君主，自称王</li><li>与中原建立联系，引入中原文化与制度</li><li>**季札**（寿梦第四子）以贤德和音乐鉴赏力著称，多次出使中原各国</li></ul>\n<h3>阖闾时代（前 514–496 BCE）</h3>\n<ul><li>阖闾（公子光）刺杀吴王僚后即位</li><li>重用**伍子胥**（楚人，父兄被楚平王杀害）和[[sun-tzu|孙武]]</li><li>**柏举之战**（前 506 BCE）：吴军大败楚军，攻破楚都郢，伍子胥掘楚平王墓鞭尸（\"鞭尸三百\"）</li><li>楚国在秦国帮助下复国，吴国未能长期占领</li></ul>\n<h3>夫差与霸业（前 495–473 BCE）</h3>\n<ul><li>夫椒之战（前 494 BCE）：大败越国，俘虏越王[[state-yue|勾践]]</li><li>但夫差不听伍子胥劝谏，释放勾践（\"赦越\"），酿成后患</li><li>北上争霸，开凿**邗沟**（中国最早的人工运河之一）</li><li>黄池之会（前 482 BCE）：与晋国争霸主地位</li><li>但此时越国已乘虚而入，攻占吴都</li></ul>\n<h2>灭亡</h2>\n<ul><li>前 473 年：越军攻破吴都姑苏，夫差自杀</li><li>伍子胥在死前预言越国将灭吴——\"抉吾眼县吴东门之上，以观越寇之入灭吴也\"</li><li>越王勾践灭吴后，吴国灭亡</li></ul>\n<h2>文化贡献</h2>\n<ul><li>吴国青铜剑铸造技术极高，干将、莫邪传说</li><li>季札出使：留下了\"季札观乐\"的文化典故</li><li>与中原的交流促进了江南地区的文明化进程</li></ul>\n<h2>关键人物</h2>\n<ul><li>**季札**：贤人，多次推让王位</li><li>**阖闾**：一代雄主</li><li>**伍子胥**：楚人，助吴破楚复仇</li><li>**夫差**：灭越→称霸→亡国</li><li>**孙武**：兵家鼻祖，仕于吴</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[spring-autumn-period]] — 春秋时代</li><li>[[state-yue]] — 越国</li><li>[[state-chu]] — 楚国</li><li>[[wu-zi-xu]] — 伍子胥</li><li>[[sun-tzu]] — 孙武</li></ul>";
  C["state-yue"]="<h1>越国 (Yue)</h1>\n<h2>概述</h2>\n<p>越国是春秋末期崛起于东南的强国，核心人物<em>*勾践</em>*以\"卧薪尝胆\"的典故闻名于世。越国灭[[state-wu|吴国]]后一度成为春秋最后的霸主，但战国中期被[[state-chu|楚国]]所灭。</p>\n<h2>地理</h2>\n<p>核心区域在今浙江省，都城会稽（今绍兴）。后迁都琅琊（今山东临沂附近），一度北上中原。</p>\n<h2>勾践与\"卧薪尝胆\"</h2>\n<h3>夫椒之败（前 494 BCE）</h3>\n<ul><li>吴王夫差大败越军于夫椒，勾践率残部退守会稽山</li><li>文种贿赂吴太宰伯嚭（pǐ），使吴王接受勾践投降</li><li>勾践率妻子入吴为质，为夫差驾车养马，三年后方得归国</li></ul>\n<h3>复国雪耻</h3>\n<ul><li>归国后睡柴薪、舔苦胆，\"卧薪尝胆，十年生聚，十年教训\"</li><li>文种献\"**灭吴九术**\"：</li></ul>\n<ol><li>尊天事鬼以求福</li><li>重财帛以遗吴君臣（贿赂）</li><li>贵籴粟槁以虚其国（输入粮食使其空虚）</li><li>遗美女以惑其心（献西施、郑旦）</li><li>遗之巧工良材使作宫室（促其大兴土木）</li><li>遗之谀臣以乱其谋</li><li>强其谏臣使自杀（离间伍子胥）</li><li>富国强兵</li><li>整军备战</li></ol>\n<h3>灭吴与北伐</h3>\n<ul><li>前 482 年：趁夫差北上争霸，越军攻入吴都姑苏</li><li>前 473 年：最终灭吴，夫差自杀</li><li>北上徐州与诸侯会盟，向周天子进贡，获得\"伯\"（霸主）称号</li><li>迁都琅琊，一度成为\"春秋最后霸主\"</li></ul>\n<h2>勾践之后的越国</h2>\n<ul><li>勾践\"长颈鸟喙，可与共患难，不可与共乐\"——功成后杀文种</li><li>范蠡及时退隐，化名\"陶朱公\"经商致富</li><li>越国霸业短暂，内部多次政变</li><li>前 334 年：楚威王大败越军，越国灭亡</li></ul>\n<h2>文化特色</h2>\n<ul><li>断发文身——与中原文化明显不同</li><li>\"越王勾践剑\"：1965 年出土，至今锋利无比，为青铜兵器巅峰之作</li><li>越窑青瓷的起源</li><li>\"吴越\"成为江南地域的文化标签</li></ul>\n<h2>关键人物</h2>\n<ul><li>**勾践**：\"卧薪尝胆\"的主角，一代枭雄</li><li>**文种**：智囊，献灭吴九术后被杀</li><li>**范蠡**：军师，功成身退</li><li>**西施**：中国古代四大美女之一（传说为越国间谍）</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[spring-autumn-period]] — 春秋时代</li><li>[[state-wu]] — 吴国</li><li>[[state-chu]] — 楚国</li><li>[[hegemon-comparison]] — 春秋霸主对比</li></ul>";
  C["state-han"]="<h1>韩国 (Han)</h1>\n<h2>概述</h2>\n<p>韩国是战国七雄中<em>*最弱小</em><em>的国家，由[[state-jin|三家分晋]]中的韩氏建立。虽为七雄之一，但地处四战之地，被秦、魏、楚包围，缺乏战略纵深。历时 173 年（前 403–前 230），是</em><em>第一个被秦灭亡</em>*的六国。</p>\n<h2>地理</h2>\n<p>都城先后在<em>*平阳</em><em>（今山西临汾）、</em><em>宜阳</em><em>、</em><em>阳翟</em><em>（今河南禹州），最后定都</em><em>新郑</em><em>（今河南新郑）。地处中原腹地，是连接东西南北的交通枢纽，但这也意味着</em><em>四面受敌</em>*。</p>\n<h2>技术优势</h2>\n<blockquote>\"天下之强弓劲弩皆从韩出\"——《战国策》</blockquote>\n<p>韩国的核心优势在于<em>*军工制造</em>*：</p>\n<ul><li>**弩**：韩国以制造强力弩机闻名，射程远、穿透力强</li><li>**铁器**：宜阳（今河南宜阳）是战国时期最大的铁冶中心之一</li><li>**剑戟**：韩国出产的剑、戟质量优异，\"陆断牛马，水截鹄雁\"</li><li>凭借精良兵器在夹缝中坚持了 170 多年</li></ul>\n<h2>申不害变法</h2>\n<ul><li>韩昭侯（前 362–前 333 BCE）任用**申不害**为相，推行变法</li><li>申不害是法家\"术\"派的代表，强调君主**驾驭群臣**的权术：</li><li>\"因任而授官，循名而责实\"</li><li>君主以\"术\"控制官僚体系</li><li>在申不害辅佐下，\"**国治兵强，无侵韩者**\"——变法期间韩国 15 年无外患</li><li>但变法依赖君主能力，申不害和韩昭侯去世后改革逐渐失效</li></ul>\n<h2>申不害 vs 商鞅</h2>\n<table><tr><th>维度</th><th>申不害（韩）</th><th>商鞅（秦）</th></tr><tr><td>法家流派</td><td>**术**派（权术）</td><td>**法**派（制度）</td></tr><tr><td>核心</td><td>君主驾驭臣下</td><td>法律面前人人平等</td></tr><tr><td>持续性</td><td>人亡政息</td><td>商鞅死而法不变</td></tr><tr><td>结果</td><td>韩国未根本改变</td><td>秦国脱胎换骨</td></tr></table>\n<h2>著名人物</h2>\n<ul><li>**申不害**：法家思想家，术派创始人</li><li>**韩非**：法家集大成者，韩国公子，《韩非子》作者。秦王嬴政读其书感叹\"寡人得见此人与之游，死不恨矣\"</li><li>**张良**（后代）：汉初三杰之一，其祖父、父亲均为韩国国相。张良毕生以\"**为韩报仇**\"为志，博浪沙刺秦</li></ul>\n<h2>外交困境</h2>\n<p>韩国地处\"天下之枢\"，是秦东出中原的必经之路：</p>\n<ul><li>东有魏、南有楚、西有秦、北有赵——被四面挤压</li><li>战略选择极端有限：不是被秦吞并，就是被魏、楚兼并</li><li>在合纵与连横之间摇摆不定，多次割地求和</li><li>郑国渠事件（前 246 BCE）：韩派水工**郑国**入秦献修渠之策，试图消耗秦国国力，反而使秦更加强大</li></ul>\n<h2>灭亡</h2>\n<ul><li>前 230 年：秦派内史腾攻韩，俘获韩王安，韩国灭亡</li><li>秦国在其地设**颍川郡**</li><li>作为六国中最先灭亡的国家，韩国开启了秦统一的序幕</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[state-jin]] — 晋国（前身）</li><li>[[warring-states-period]] — 战国时代</li><li>[[state-zhao]] · [[state-wei]] — 韩赵魏三家</li><li>[[han-fei]] — 韩非子</li></ul>";
  C["state-zhao"]="<h1>赵国 (Zhao)</h1>\n<h2>概述</h2>\n<p>赵国是[[state-jin|三家分晋]]后建立的强国，战国后期秦国的<em>*头号军事对手</em>*。在赵武灵王\"胡服骑射\"改革后达到鼎盛，一度成为唯一能单独对抗秦国的东方国家。但长平之战惨败后一蹶不振，于前 228 年被秦所灭，历时 175 年。</p>\n<h2>地理</h2>\n<p>都城初在<em>*晋阳</em><em>（今太原），后迁</em><em>中牟</em><em>，最终定都</em><em>邯郸</em>*（今河北邯郸）。疆域横跨今山西、河北、内蒙古南部，北接匈奴，南临中原。邯郸是战国时期北方最大的都市。</p>\n<h2>赵武灵王与胡服骑射</h2>\n<ul><li>赵武灵王（前 325–前 299 BCE 在位）是赵国最伟大的君主</li><li>**前 307 年推行\"胡服骑射\"**：</li><li>放弃中原宽袍大袖，改穿北方游牧民族的**窄袖短衣**</li><li>学习骑射技术，建立**独立的骑兵部队**</li><li>这是中国军事史上第一次有意识的骑兵改革</li><li>改革成果：</li><li>灭中山国（前 296 年）</li><li>向北拓地至云中、九原（今内蒙古），设立三郡</li><li>修筑赵长城防御匈奴</li><li>赵国一跃成为军事强国</li></ul>\n<h3>赵武灵王的悲剧</h3>\n<ul><li>壮年退位（自称\"主父\"），传位幼子赵何（赵惠文王）</li><li>后又怜悯长子赵章，欲分割赵国，\"两王之\"</li><li>引发**沙丘之乱**（前 295 年）：赵章政变失败，赵武灵王被围困沙丘宫，**饿死**三月</li></ul>\n<h2>赵惠文王时期（鼎盛）</h2>\n<ul><li>任用**蔺相如**、**廉颇**、**赵奢**等名臣</li><li>**完璧归赵**（前 283 年）：蔺相如使秦，以智勇保全和氏璧</li><li>**渑池之会**（前 279 年）：蔺相如力挫秦王，维护赵国尊严</li><li>**将相和**：廉颇负荆请罪，与蔺相如和解</li><li>**阏与之战**（前 269 年）：赵奢大败秦军，证明赵军可与秦军正面交战</li></ul>\n<h2>长平之战的悲剧</h2>\n<blockquote>前 260 年，是中国军事史上最惨烈的战役之一</blockquote>\n<h3>背景</h3>\n<ul><li>秦攻韩上党，上党郡守冯亭献地于赵</li><li>[[lord-pingyuan|平原君赵胜]]力主接受，引发秦赵决战</li></ul>\n<h3>经过</h3>\n<ul><li>初期：廉颇固守长平，与秦将王龁对峙三年</li><li>转折：秦用反间计，散布\"秦独畏马服子赵括\"</li><li>赵孝成王以**赵括**（纸上谈兵）替代廉颇</li><li>秦秘遣**白起**为帅，切断赵军粮道和后路</li><li>赵军断粮 46 天，赵括突围**被射杀**</li></ul>\n<h3>结果</h3>\n<ul><li>白起**坑杀赵卒四十余万**（仅放回 240 名少年兵）</li><li>赵国精锐尽丧，\"赵氏壮者皆尽长平\"</li><li>从此赵国再也无力单独对抗秦国</li></ul>\n<h2>邯郸保卫战</h2>\n<ul><li>前 259–前 257 年：秦军围困邯郸近两年</li><li>平原君散家财，李同率三千敢死队冲击</li><li>[[lord-xinling|信陵君窃符救赵]]、楚国出兵救援</li><li>邯郸之围**最终解除**，但赵国元气已大伤</li></ul>\n<h2>后期与灭亡</h2>\n<h3>战国后期名将</h3>\n<ul><li>**廉颇**：老当益壮，但受猜忌逃亡魏、楚</li><li>**李牧**：赵国最后的支柱</li><li>大破匈奴，歼灭十余万骑</li><li>长期防御秦国，秦将王翦不能突破</li><li>前 229 年：秦用反间计，赵王迁杀李牧</li></ul>\n<h3>灭亡</h3>\n<ul><li>李牧死后第二年（前 228 年），王翦攻破邯郸，赵国灭亡</li><li>赵公子嘉北逃至代地，自立为代王</li><li>前 222 年：秦灭代，赵国彻底终结</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[state-jin]] — 晋国（前身）</li><li>[[state-han]] · [[state-wei]] — 韩赵魏三家</li><li>[[warring-states-period]] — 战国时代</li><li>[[lord-pingyuan]] — 平原君赵胜</li><li>[[battle-of-changping]] — 长平之战</li></ul>";
  C["state-wei"]="<h1>魏国 (Wei)</h1>\n<h2>概述</h2>\n<p>魏国是[[state-jin|三家分晋]]后最强的一支，<em>*战国初期首霸</em>*，在李悝变法和吴起军改的推动下率先崛起。但因战略失误和人才流失（商鞅、张仪、范雎等均从魏入秦），逐渐衰落，最终于前 225 年被秦所灭，历时 178 年。</p>\n<h2>地理</h2>\n<p>都城先在<em>*安邑</em><em>（今山西夏县），后因受秦压迫，迁至</em><em>大梁</em>*（今河南开封）。核心区在黄河中下游（今河南东部、山西南部）。疆域被韩、赵隔断，呈不连续形态，战略防御困难。</p>\n<h2>崛起：战国首霸</h2>\n<h3>魏文侯（前 445–前 396 BCE）</h3>\n<ul><li>战国初期最具眼光的君主</li><li>**尊贤重士**：师事子夏（孔子弟子），礼遇田子方、段干木</li><li>开战国变法先河</li></ul>\n<h3>李悝变法（战国最早变法）</h3>\n<table><tr><th>领域</th><th>内容</th></tr><tr><td>**政治**</td><td>废除世卿世禄，选贤任能</td></tr><tr><td>**经济**</td><td>\"尽地力之教\"——精耕细作；**平籴法**——国家调控粮价</td></tr><tr><td>**法律**</td><td>著《**法经**》（六篇），中国第一部成文法典，商鞅携之入秦</td></tr><tr><td>**军事**</td><td>吴起改革军制，建立**魏武卒**（精锐重装步兵）</td></tr></table>\n<h3>吴起与魏武卒</h3>\n<ul><li>吴起任西河守，创建精锐部队**魏武卒**</li><li>士兵选拔严苛：\"衣三属之甲，操十二石之弩\"</li><li>与诸侯大战七十六，全胜六十四</li><li>**前 389 年阴晋之战**：吴起以五万魏武卒大破秦军五十万</li><li>魏武卒的战绩使魏国军事霸权达到顶峰</li></ul>\n<h2>转折：从首霸到衰落</h2>\n<h3>魏惠王（前 369–前 319 BCE）</h3>\n<ul><li>在位 50 年，前期延续霸业，后期急剧衰退</li><li>**逢泽之会**（前 344 BCE）：率十二诸侯朝见周天子，霸业巅峰</li><li>但两大战略失误葬送霸权：</li></ul>\n<table><tr><th>失误</th><th>后果</th></tr><tr><td>不杀商鞅</td><td>商鞅入秦，推动秦国崛起</td></tr><tr><td>攻赵伐韩</td><td>引发桂陵、马陵之战</td></tr></table>\n<h3>桂陵之战（前 354 BCE）</h3>\n<ul><li>魏攻赵都邯郸 → 齐将**孙膑**\"**围魏救赵**\"</li><li>魏将庞涓大败，但未伤根本</li></ul>\n<h3>马陵之战（前 342 BCE）——魏国由盛转衰的转折点</h3>\n<ul><li>魏攻韩 → 孙膑再出，以**减灶计**诱庞涓追击</li><li>庞涓至马陵道，见树上书\"**庞涓死于此树之下**\"</li><li>齐军万弩齐发，魏军覆没，庞涓**自杀**</li><li>魏国精锐尽丧，从此失去霸主地位</li></ul>\n<h2>人才流失</h2>\n<p>魏国培养了战国最多的顶级人才，但全部外流：</p>\n<table><tr><th>人才</th><th>去向</th><th>后果</th></tr><tr><td>**商鞅**</td><td>入秦</td><td>变法使秦富强</td></tr><tr><td>**孙膑**</td><td>入齐</td><td>桂陵、马陵两次击败魏国</td></tr><tr><td>**张仪**</td><td>入秦</td><td>连横破合纵</td></tr><tr><td>**范雎**</td><td>入秦</td><td>远交近攻战略</td></tr><tr><td>**吴起**</td><td>入楚</td><td>变法强楚</td></tr></table>\n<blockquote>**致命原因**：魏国贵族势力强大，排挤外来人才；秦国则广纳天下之士。此消彼长。</blockquote>\n<h2>[[lord-xinling|信陵君]]的回光返照</h2>\n<ul><li>前 247 年，信陵君率五国联军大败秦军——魏国最后一次辉煌</li><li>但魏王猜忌夺权，信陵君抑郁而终</li><li>魏国再无回天之力</li></ul>\n<h2>灭亡</h2>\n<ul><li>前 225 年：秦将王贲引黄河水灌大梁城</li><li>城墙崩塌，魏王假投降，魏国灭亡</li><li>历时 178 年，从首霸到亡国</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[state-jin]] — 晋国（前身）</li><li>[[state-han]] · [[state-zhao]] — 韩赵魏三家</li><li>[[warring-states-period]] — 战国时代</li><li>[[lord-xinling]] — 信陵君魏无忌</li><li>[[sun-bin]] — 孙膑</li></ul>";
  C["state-yan"]="<h1>燕国 (Yan)</h1>\n<h2>概述</h2>\n<p>燕国是西周开国功臣<em>*召公奭</em><em>的封国，姬姓。地处北方（今北京、河北北部、辽宁），长期偏僻于中原争霸之外，战国时期跻身七雄。因</em><em>荆轲刺秦王</em><em>的悲壮故事和乐毅破齐的辉煌战绩留名青史。历时约 800 年，前 222 年被秦所灭，是</em><em>七雄中存在时间最长的国家</em>*之一。</p>\n<h2>地理</h2>\n<p>都城<em>*蓟</em>*（今北京市西南）。疆域北至辽东，南接齐、赵。地处边远，与中原诸国交流较少，但也因此较少被卷入中原核心战乱。</p>\n<h2>历史演进</h2>\n<h3>春秋时期</h3>\n<ul><li>长期默默无闻，国力弱于中原大国</li><li>与戎狄（山戎）交战频繁，一度几乎亡国</li><li>齐桓公北伐山戎救燕，\"老马识途\"即发生于此役</li></ul>\n<h3>燕王哙与子之之乱（前 316–前 314 BCE）</h3>\n<ul><li>燕王哙受纵横家**苏代**蛊惑，效仿尧舜\"禅让\"王位给国相**子之**</li><li>引发内乱，太子平起兵失败被杀</li><li>齐国趁机入侵，\"五旬而举燕\"——齐国仅 50 天即攻占燕国全境</li><li>后因齐军暴虐，燕人反抗，各国干涉，齐军被迫撤退</li><li>燕昭王在废墟中即位，立志复仇</li></ul>\n<h2>黄金时代：燕昭王与乐毅</h2>\n<h3>燕昭王（前 311–前 279 BCE）</h3>\n<ul><li>\"卑身厚币以招贤者\"，筑**黄金台**延揽人才</li><li>乐毅、邹衍、剧辛等名士纷纷来投</li></ul>\n<h3>乐毅伐齐（前 284 BCE）</h3>\n<ul><li>燕昭王以乐毅为上将，联合赵、楚、韩、魏**五国联军伐齐**</li><li>乐毅率燕军长驱直入，连下齐国七十余城</li><li>仅剩**即墨**和**莒**两城未被攻陷</li><li>齐国几乎亡国——这是战国时期一次灭国级战争</li></ul>\n<h3>乐毅被替换</h3>\n<ul><li>燕昭王去世，燕惠王即位</li><li>齐将**田单**施反间计，燕惠王以**骑劫**替换乐毅</li><li>田单以\"**火牛阵**\"大破燕军，一举收复齐国失地</li><li>乐毅逃亡赵国，燕国复兴齐国之梦破灭</li></ul>\n<h2>末期与荆轲刺秦</h2>\n<h3>燕太子丹的绝望</h3>\n<ul><li>战国末期，秦军压境，灭韩破赵</li><li>燕太子丹曾在秦国为质，受辱逃归</li><li>决意铤而走险——**刺杀秦王嬴政**</li></ul>\n<h3>荆轲刺秦王（前 227 BCE）</h3>\n<ul><li>太子丹派**荆轲**携督亢地图和秦叛将樊於期之首出使秦国</li><li>图穷**匕首见**：地图展开至尽头，匕首露出</li><li>荆轲抓住嬴政衣袖，嬴政挣断衣袖绕柱而逃</li><li>侍医夏无且以药囊掷击荆轲，嬴政拔剑砍伤荆轲</li><li>荆轲事败被杀，临死倚柱而笑</li><li>\"**风萧萧兮易水寒，壮士一去兮不复还**\"</li></ul>\n<h3>秦的反应</h3>\n<ul><li>嬴政大怒，派王翦等大举攻燕</li><li>前 226 年：秦军攻破蓟城，燕王喜和太子丹逃往辽东</li><li>燕王喜杀太子丹，献首于秦以求和——秦不予理睬</li><li>前 222 年：秦将王贲攻辽东，俘虏燕王喜，**燕国灭亡**</li></ul>\n<h2>地理与文化特色</h2>\n<ul><li>燕地民风\"愚憨而少文\"，以坚韧忠烈著称</li><li>荆轲刺秦集中体现了燕赵\"慷慨悲歌\"之士的精神气质</li><li>后世\"燕赵多慷慨悲歌之士\"成为文化标签</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[warring-states-period]] — 战国时代</li><li>[[state-qi]] · [[state-zhao]] — 邻国</li><li>[[jing-ke]] — 荆轲</li><li>[[yue-yi]] — 乐毅</li><li>[[qin-shi-huang]] — 秦始皇</li></ul>";
  C["lord-mengchang"]="<h1>孟尝君 (田文)</h1>\n<h2>基本信息</h2>\n<ul><li>**姓名**：田文</li><li>**身份**：齐国宗室，齐威王之孙，靖郭君田婴之子</li><li>**封号**：孟尝君（封于薛地，今山东枣庄）</li><li>**时代**：战国中期（齐宣王、齐湣王时期）</li><li>**门客**：号称**三千人**</li></ul>\n<h2>生平</h2>\n<h3>早年</h3>\n<ul><li>父田婴有子四十余人，田文为妾室所生，出生日不吉（五月五日），险些被弃养</li><li>田文长大后以才智说服父亲，被立为继承人</li><li>继承父亲封地薛邑后广招门客，\"诸侯宾客及亡人有罪者\"皆来归附</li></ul>\n<h3>仕齐</h3>\n<ul><li>齐湣王时期任齐相，长期把持齐国朝政</li><li>曾联合韩、魏攻楚，又参与合纵攻秦</li><li>与苏秦等纵横家过从甚密</li></ul>\n<h3>鸡鸣狗盗（经典典故）</h3>\n<ul><li>孟尝君曾入秦为相，秦昭襄王听信谗言将其囚禁</li><li>门客中有人善偷盗（\"狗盗\"），偷回已献给秦王的狐白裘，转献秦王宠姬，使孟尝君获释</li><li>逃至函谷关时天未亮，关门需鸡鸣方开；另一门客学鸡叫（\"鸡鸣\"），引出群鸡齐鸣，骗开城门逃脱</li></ul>\n<h3>狡兔三窟（冯谖/冯驩）</h3>\n<ul><li>门客冯谖为孟尝君经营\"三窟\"：</li></ul>\n<ol><li>焚毁薛地百姓债券，收买民心</li><li>游说梁惠王（魏国）聘孟尝君为相，提高身价</li><li>劝说齐王在薛地立先王宗庙，巩固根基</li></ol>\n<ul><li>孟尝君因此\"高枕无忧\"数十年</li></ul>\n<h3>与齐王决裂</h3>\n<ul><li>后因权力过大被齐湣王猜忌，一度逃亡魏国任相</li><li>曾参与五国攻齐（前 284 年），齐国几乎亡国</li><li>齐襄王即位后，孟尝君\"中立为诸侯，无所属\"，在薛地保持独立</li></ul>\n<h2>评价</h2>\n<ul><li>**司马迁**：孟尝君养士是为了巩固自己的政治势力，而非单纯为了齐国</li><li>**争议**：养士三千但多为\"鸡鸣狗盗\"之辈，缺少真正的大才</li><li>苏轼《论养士》：批评孟尝君门下\"皆鸡鸣狗盗之雄耳\"</li></ul>\n<h2>结局</h2>\n<p>孟尝君去世后，诸子争立，齐、魏联合灭薛，孟尝君<em>*绝嗣无后</em>*。</p>\n<blockquote>司马迁感叹：\"孟尝君绝嗣无后\"——养士三千，最终无人继承。</blockquote>\n<h2>相关条目</h2>\n<ul><li>[[state-qi]] — 齐国</li><li>[[warring-states-period]] — 战国时代</li><li>[[lord-xinling|信陵君]] · [[lord-pingyuan|平原君]] · [[lord-chunshen|春申君]]</li></ul>";
  C["lord-xinling"]="<h1>信陵君 (魏无忌)</h1>\n<h2>基本信息</h2>\n<ul><li>**姓名**：魏无忌</li><li>**身份**：魏昭王之子，魏安釐王异母弟</li><li>**封号**：信陵君（封于信陵，今河南宁陵）</li><li>**时代**：战国后期</li><li>**评价**：**四公子中最贤**——司马迁最为推崇</li></ul>\n<h2>核心品格</h2>\n<p>信陵君以<em>*礼贤下士</em>*闻名，与另三位公子不同，他不以门第取人，真正尊重有才之士。</p>\n<h2>窃符救赵（核心典故）</h2>\n<h3>背景</h3>\n<ul><li>前 257 年，秦军围困赵国都城邯郸</li><li>平原君（信陵君姐夫）多次向魏国求救</li><li>魏王虽派晋鄙率军救赵，但因秦国恐吓而按兵不动</li></ul>\n<h3>侯嬴献计</h3>\n<ul><li>信陵君门客**侯嬴**（守门小吏）献计：</li></ul>\n<ol><li>请魏王宠妃**如姬**盗出调兵**虎符**</li><li>带力士**朱亥**同行，若晋鄙不交兵权则击杀之</li></ol>\n<ul><li>侯嬴在信陵君出发后**自刎**，以死相送</li></ul>\n<h3>夺兵救赵</h3>\n<ul><li>信陵君持虎符至晋鄙军中，晋鄙生疑，朱亥以铁锤击杀晋鄙</li><li>信陵君精选八万精兵，南下救赵</li><li>秦军撤退，**邯郸之围解除**</li></ul>\n<h3>之后</h3>\n<ul><li>信陵君\"窃符救赵\"后不敢回魏，留居赵国十年</li><li>在赵国结交隐士**毛公**（赌徒）和**薛公**（卖酒者），平原君曾因此嘲笑，信陵君反责其\"徒有虚名\"</li></ul>\n<h2>回魏抗秦</h2>\n<ul><li>前 247 年，秦将蒙骜攻魏，魏王请信陵君回国</li><li>信陵君率**五国联军**（楚、赵、韩、魏、燕）大败秦军于河外，追击至函谷关</li><li>这是战国后期**合纵最成功的一次**，也是六国最后一次有效压制秦国</li></ul>\n<h2>结局</h2>\n<ul><li>信陵君功高震主，秦用反间计散布其欲篡位的谣言</li><li>魏王猜忌，夺其兵权</li><li>信陵君**心灰意冷**，\"日夜为乐饮者四岁\"，前 243 年**病酒而卒**</li><li>司马迁赴其墓前凭吊，称其为\"魏之德星\"</li></ul>\n<h2>评价</h2>\n<ul><li>**司马迁**（《魏公子列传》）：唯一以\"公子\"而非名号称之，流露最大敬意</li><li>**军事评价**：统兵有方，著有《魏公子兵法》（已佚）</li><li>李白《侠客行》赞朱亥、侯嬴，亦侧面颂扬信陵君识人之明</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[warring-states-period]] — 战国时代</li><li>[[state-jin]] — 晋国（魏国前身）</li><li>[[state-wei]] — 魏国</li><li>[[lord-mengchang|孟尝君]] · [[lord-pingyuan|平原君]] · [[lord-chunshen|春申君]]</li></ul>";
  C["lord-pingyuan"]="<h1>平原君 (赵胜)</h1>\n<h2>基本信息</h2>\n<ul><li>**姓名**：赵胜</li><li>**身份**：赵武灵王之子，赵惠文王之弟</li><li>**封号**：平原君（封于东武城，今山东武城）</li><li>**时代**：战国后期（赵惠文王、赵孝成王时期）</li><li>**门客**：数千人</li><li>**家族关系**：姐姐为信陵君之妻（魏赵联姻）</li></ul>\n<h2>生平事迹</h2>\n<h3>三任赵相</h3>\n<p>平原君在赵惠文王和赵孝成王时期<em>*三度出任国相</em>*，三度被罢免，是赵国政坛的常青树。</p>\n<h3>毛遂自荐（经典典故）</h3>\n<ul><li>前 258 年秦围邯郸，赵国危在旦夕</li><li>平原君奉命赴**楚国求救**，需选 20 名门客随行，只选出 19 人</li><li>**毛遂**自荐同行，平原君以\"锥处囊中\"之喻质疑</li><li>至楚国后，毛遂在谈判中按剑上前，陈说利害：\"**以楚之强，天下弗能当**\"</li><li>楚王被说服，歃血为盟，出兵救赵</li><li>平原君感叹：\"毛先生以三寸之舌，强于百万之师！\"</li></ul>\n<h3>长平之战的争议</h3>\n<ul><li>前 262 年，秦攻韩上党，上党郡守冯亭献地于赵</li><li>平原君**力主接受上党**——此举直接挑动了长平之战</li><li>长平之战（前 260 年）赵军**折损四十余万**，国力大伤</li><li>后世多认为平原君在此事上**判断失误**，为贪一郡之地付出惨重代价</li></ul>\n<h3>邯郸保卫战</h3>\n<ul><li>长平之战后秦军围困邯郸，平原君**散尽家财**犒赏士卒</li><li>门客**李同**（李谈）率三千敢死队冲击秦军，秦军后退三十里</li><li>加上信陵君窃符救赵、楚国援军到达，邯郸之围最终解除</li></ul>\n<h3>杀妾谢士</h3>\n<p>平原君家楼临民宅，有美人嘲笑邻居跛子，跛子来告。平原君最初不以为然，门客纷纷离去。后醒悟，<em>*斩美人头登门谢罪</em>*，门客渐复归。</p>\n<h2>评价</h2>\n<ul><li>**司马迁**：\"翩翩浊世之佳公子也\"——但\"未睹大体\"</li><li>**优点**：好客、识才（毛遂）、危急时散家财守城</li><li>**缺点**：政治判断平庸，长平之战的决策备受诟病；对信陵君的讥讽暴露了眼光局限</li><li>谯周认为长平之战不应全怪平原君——赵王换将（以赵括代廉颇）的决策才是关键</li></ul>\n<h2>结局</h2>\n<p>平原君在邯郸解围后继续辅政，<em>*前 251 年去世</em>*，算是善终。子孙继承封爵，直至赵国灭亡。</p>\n<h2>相关条目</h2>\n<ul><li>[[warring-states-period]] — 战国时代</li><li>[[state-zhao]] — 赵国</li><li>[[lord-mengchang|孟尝君]] · [[lord-xinling|信陵君]] · [[lord-chunshen|春申君]]</li><li>[[battle-of-changping|长平之战]]</li></ul>";
  C["lord-chunshen"]="<h1>春申君 (黄歇)</h1>\n<h2>基本信息</h2>\n<ul><li>**姓名**：黄歇</li><li>**身份**：楚国贵族（**唯一非王族**的四公子）</li><li>**封号**：春申君（先封淮北十二县，后改封江东，以吴墟<今苏州>为都）</li><li>**官职**：楚国**令尹**（相当于丞相）</li><li>**时代**：战国后期（楚顷襄王、楚考烈王时期）</li><li>**门客**：三千余人</li></ul>\n<h2>生平</h2>\n<h3>扶立楚王</h3>\n<ul><li>楚顷襄王病重时，黄歇与太子完（后来的考烈王）在秦国为质</li><li>设计让太子穿使者衣服逃回楚国继位，自己留下善后</li><li>秦昭襄王怒欲杀之，赖范雎劝说：太子已即位，杀黄歇无益</li><li>黄歇归国后被封为**春申君**、任**令尹**，权倾楚国</li></ul>\n<h3>巅峰时期</h3>\n<ul><li>援赵抗秦（邯郸之战中出兵救赵，与平原君、信陵君联手）</li><li>北伐灭鲁（前 249 年），将鲁国并入楚国</li><li>曾组织最后一次大规模**合纵攻秦**（前 241 年），庞煖为主帅，但未能成功</li><li>门客三千，与齐国孟尝君、赵国平原君、魏国信陵君\"方争下士，招致宾客，以相倾夺\"</li></ul>\n<h3>改封江东</h3>\n<ul><li>因淮北濒临齐国，春申君献淮北十二县设立郡治</li><li>楚王将其改封江东——**今上海、苏州一带**的早期开发者</li><li>相传春申君疏浚黄歇浦（即**黄浦江**前身），上海别称\"**申城**\"由此而来</li></ul>\n<h2>结局：千古悲剧</h2>\n<h3>李园之谋</h3>\n<ul><li>楚考烈王**无子**，春申君多次进献妇人，均未生育</li><li>赵人**李园**将妹妹先献给春申君，待怀孕后又献计：将她献给楚王</li><li>春申君照办，李园之妹入宫后生子，立为太子（后来的楚幽王）</li><li>李园也因此得势</li></ul>\n<h3>朱英警告</h3>\n<ul><li>门客朱英警告春申君：李园必杀人灭口，\"**毋望之祸**\"将至</li><li>劝他先发制人，杀掉李园</li><li>春申君不以为然，认为李园\"弱人也，仆又善之\"</li></ul>\n<h3>身死族灭</h3>\n<ul><li>**前 238 年**，楚考烈王病逝</li><li>李园抢先入宫，在**棘门设伏**</li><li>春申君入宫时被刺客**斩首**，头颅被扔在棘门外</li><li>李园随后灭春申君全家，\"尽灭春申君之家\"</li></ul>\n<h2>评价</h2>\n<ul><li>**司马迁**：年轻时以才智辅佐楚王，\"可谓智矣\"；但晚年\"当断不断，反受其乱\"——这是最沉痛的批评</li><li>**悲剧根源**：参与后宫阴谋，引狼入室，优柔寡断</li><li>在四公子中权势最大（掌控楚国军政大权），但结局也**最惨烈**</li></ul>\n<h2>与上海的关系</h2>\n<p>春申君治理江东，疏浚河道，被后世追认为上海的早期开发者：</p>\n<ul><li>\"**申**\"——上海的简称之一</li><li>\"春申路\"、\"春申塘\"等上海地名皆源于此</li><li>上海的\"申\"字亦含对春申君的纪念</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[state-chu]] — 楚国</li><li>[[warring-states-period]] — 战国时代</li><li>[[lord-mengchang|孟尝君]] · [[lord-xinling|信陵君]] · [[lord-pingyuan|平原君]]</li><li>[[huangpu-river]] — 黄浦江</li></ul>";
  C["confucius"]="<h1>孔子 (Confucius)</h1>\n<h2>基本信息</h2>\n<ul><li>**姓名**：孔丘，字仲尼</li><li>**生卒**：公元前 551 年 – 前 479 年（73 岁）</li><li>**国籍**：鲁国（今山东曲阜）</li><li>**时代**：春秋晚期</li><li>**身份**：思想家、教育家、儒家学派创始人</li></ul>\n<h2>生平</h2>\n<table><tr><th>阶段</th><th>年龄</th><th>主要事迹</th></tr><tr><td>早年</td><td>0–15</td><td>生于鲁国陬邑，父叔梁纥早逝，家境贫寒</td></tr><tr><td>志学</td><td>15–30</td><td>\"吾十有五而志于学\"，自学礼乐</td></tr><tr><td>仕鲁</td><td>30–51</td><td>在鲁国任中都宰、司空、大司寇，曾参与夹谷之会</td></tr><tr><td>周游列国</td><td>55–68</td><td>率弟子周游卫、宋、陈、蔡等国 14 年，\"累累若丧家之狗\"</td></tr><tr><td>晚年</td><td>68–73</td><td>返回鲁国，整理典籍，教授弟子</td></tr></table>\n<h2>核心思想</h2>\n<h3>仁</h3>\n<ul><li>\"仁者爱人\"——最高道德准则</li><li>\"己所不欲，勿施于人\"——道德金律</li><li>\"克己复礼为仁\"</li></ul>\n<h3>礼</h3>\n<ul><li>恢复周礼，重建社会秩序</li><li>非仅是形式，而是内心敬意的外化</li><li>\"不学礼，无以立\"</li></ul>\n<h3>教育思想</h3>\n<ul><li>**有教无类**：打破贵族教育垄断，首创私学</li><li>**因材施教**：针对不同弟子采用不同教法</li><li>**温故知新**、**不愤不启，不悱不发**</li><li>弟子三千，贤者七十二</li></ul>\n<h3>政治思想</h3>\n<ul><li>**德治**：以德化民（vs 法治）</li><li>**正名**：\"君君臣臣父父子子\"</li><li>**举贤才**：任用有德有能之人</li></ul>\n<h2>著作</h2>\n<ul><li>**《论语》**：弟子及再传弟子整理的孔子语录，儒学第一经典</li><li>**删定六经**：传统认为孔子整理《诗》《书》《礼》《乐》《易》《春秋》</li></ul>\n<h2>后世影响</h2>\n<ul><li>汉武帝\"罢黜百家，[[hundred-schools-of-thought|独尊儒术]]\"后，儒学成为官方正统</li><li>历代追封：至圣先师、文宣王、大成至圣文宣王</li><li>科举考试以四书五经为标准</li><li>儒学传入朝鲜、日本、越南，形成\"汉字文化圈\"共同价值</li></ul>\n<h2>争议与多元解读</h2>\n<ul><li>**保守与进步**：是\"复古\"还是\"托古改制\"？</li><li>**五四运动**：新文化运动\"打倒孔家店\"，批判礼教</li><li>**当代复兴**：儒学热、国学热，孔子学院全球推广</li></ul>\n<h2>名言</h2>\n<blockquote>\"三人行，必有我师焉。\" \"学而不思则罔，思而不学则殆。\" \"朝闻道，夕死可矣。\" \"岁寒，然后知松柏之后凋也。\"</blockquote>\n<h2>相关条目</h2>\n<ul><li>[[hundred-schools-of-thought]] — 诸子百家</li><li>[[spring-autumn-period]] — 春秋时代背景</li><li>[[confucianism]] — 儒学思想体系</li><li>[[laozi]] — 同时代道家创始人</li><li>[[the-analects]] — 《论语》</li></ul>";
  C["laozi"]="<h1>老子 (Laozi)</h1>\n<h2>基本信息</h2>\n<ul><li>**姓名**：李耳，字聃（有争议）</li><li>**生卒**：传统说法略早于孔子（约前 6 世纪），但《老子》一书可能成书于战国</li><li>**国籍**：楚国苦县（一说陈国）</li><li>**时代**：春秋晚期（一说战国）</li><li>**身份**：道家学派创始人，周守藏室之史（国家图书馆馆长）</li></ul>\n<h2>历史争议</h2>\n<ul><li>**人物真实性**：司马迁《史记》已表存疑，提出老莱子、周太史儋等可能性</li><li>**《老子》成书**：1993 年郭店楚简发现最早的《老子》抄本（战国中期偏晚），证明战国时已有流传</li><li>**主流观点**：老子其人其书是真实存在的，但具体生平难以确证</li></ul>\n<h2>核心思想（《老子》/《道德经》）</h2>\n<h3>道</h3>\n<blockquote>\"道可道，非常道；名可名，非常名。\"</blockquote>\n<ul><li>**宇宙本源**：\"道生一，一生二，二生三，三生万物\"</li><li>超越语言和概念，不可言说，\"大象无形\"</li><li>道法自然——以自然为最高法则</li></ul>\n<h3>无为</h3>\n<blockquote>\"为无为，则无不治。\"</blockquote>\n<ul><li>不妄为、不强为，顺应自然规律</li><li>批判儒家礼乐教化——\"绝圣弃智，民利百倍\"</li><li>政治理想：\"治大国若烹小鲜\"——少折腾</li></ul>\n<h3>辩证思维</h3>\n<blockquote>\"祸兮福之所倚，福兮祸之所伏。\"</blockquote>\n<ul><li>对立面相互依存、相互转化</li><li>\"柔弱胜刚强\"——以柔克刚的策略智慧</li><li>\"上善若水，水善利万物而不争\"</li></ul>\n<h3>小国寡民</h3>\n<blockquote>\"小国寡民……邻国相望，鸡犬之声相闻，民至老死不相往来。\"</blockquote>\n<ul><li>反对技术进步和文明扩张</li><li>回归质朴和谐的原始状态</li></ul>\n<h2>《道德经》结构</h2>\n<ul><li>81 章，约 5,000 字（\"五千言\"）</li><li>上篇《道经》（1–37 章）+ 下篇《德经》（38–81 章）</li><li>世界上译本最多的中文著作之一（仅次于《圣经》）</li></ul>\n<h2>后世影响</h2>\n<ul><li>**道教**：被奉为道祖（太上老君），但道家 ≠ 道教</li><li>**黄老之学**（汉初）：与法家结合，成为\"文景之治\"的治国思想</li><li>**魏晋玄学**：\"三玄\"（《老》《庄》《易》）之一</li><li>**世界影响**：荣格心理学、海德格尔哲学、现代环保运动都受其启发</li></ul>\n<h2>名言</h2>\n<blockquote>\"上善若水。水善利万物而不争，处众人之所恶，故几于道。\" \"知人者智，自知者明。胜人者有力，自胜者强。\" \"千里之行，始于足下。\" \"大方无隅，大器晚成，大音希声，大象无形。\"</blockquote>\n<h2>与 [[confucius|孔子]] 的对话</h2>\n<p>《史记》记载孔子问礼于老子，老子对孔子说：</p>\n<blockquote>\"去子之骄气与多欲，态色与淫志，是皆无益于子之身。\"</blockquote>\n<p>两种根本不同的精神气质：儒家入世，道家出世；儒家进取，道家退守；二者互补形成中国文化的基本张力。</p>\n<h2>相关条目</h2>\n<ul><li>[[confucius]] — 同时代儒家创始人</li><li>[[hundred-schools-of-thought]] — 诸子百家</li><li>[[taoism]] — 道家思想</li><li>[[zhuangzi]] — 庄子（道家第二号人物）</li></ul>";
  C["sun-tzu"]="<h1>孙子（孙武）</h1>\n<h2>基本信息</h2>\n<ul><li>**姓名**：孙武，字长卿</li><li>**生卒**：约公元前 544 – 前 496 年</li><li>**国籍**：齐国（出生），后仕于吴国</li><li>**时代**：春秋晚期</li><li>**身份**：军事家、兵家代表人物</li></ul>\n<h2>生平</h2>\n<p>孙武出身齐国军事世家，后由[[spring-autumn-period|吴国]]大臣伍子胥推荐给[[spring-autumn-period#春秋五霸|吴王阖闾]]。阖闾命其练兵以试才能：</p>\n<blockquote>孙武以吴王宫中美女 180 人操练，\"三令五申\"后斩两名队长（吴王宠姬），队伍立刻严整。</blockquote>\n<p>这是\"孙子练兵\"的著名故事，展现了孙武<em>*令行禁止、军令如山</em>*的治军原则。</p>\n<p>此后孙武率吴军西破强楚，北威齐晋，辅助吴王阖闾成为\"春秋五霸\"之一。</p>\n<h2>《孙子兵法》</h2>\n<h3>基本结构</h3>\n<ul><li>13 篇，约 6,000 字</li><li>中国现存最早的兵书，也是世界军事理论的经典</li></ul>\n<h3>十三篇概览</h3>\n<table><tr><th>篇次</th><th>篇名</th><th>核心内容</th></tr><tr><td>1</td><td>始计</td><td>五事七计，庙算胜负</td></tr><tr><td>2</td><td>作战</td><td>速战速决，因粮于敌</td></tr><tr><td>3</td><td>谋攻</td><td>上兵伐谋，不战而屈人之兵</td></tr><tr><td>4</td><td>军形</td><td>先为不可胜，以待敌之可胜</td></tr><tr><td>5</td><td>兵势</td><td>奇正相生，如转圆石于千仞之山</td></tr><tr><td>6</td><td>虚实</td><td>避实击虚，致人而不致于人</td></tr><tr><td>7</td><td>军争</td><td>以迂为直，后发先至</td></tr><tr><td>8</td><td>九变</td><td>将在外君命有所不受</td></tr><tr><td>9</td><td>行军</td><td>处军相敌，判断敌情</td></tr><tr><td>10</td><td>地形</td><td>六种地形与应对之道</td></tr><tr><td>11</td><td>九地</td><td>九种战场态势与心理战术</td></tr><tr><td>12</td><td>火攻</td><td>以火佐攻</td></tr><tr><td>13</td><td>用间</td><td>间谍五种，知彼知己</td></tr></table>\n<h2>核心军事思想</h2>\n<h3>慎战</h3>\n<blockquote>\"兵者，国之大事，死生之地，存亡之道，不可不察也。\"</blockquote>\n<ul><li>战争是最后手段，非不得已不轻用</li><li>与其打烂，不如全胜：\"全国为上，破国次之\"</li></ul>\n<h3>全胜</h3>\n<blockquote>\"不战而屈人之兵，善之善者也。\"</blockquote>\n<ul><li>最高境界不是百战百胜，而是不战而胜</li><li>通过谋略、外交、威慑达成目标</li></ul>\n<h3>知彼知己</h3>\n<blockquote>\"知彼知己，百战不殆；不知彼而知己，一胜一负；不知彼不知己，每战必殆。\"</blockquote>\n<ul><li>情报和认知是决策的基础</li><li>信息不对称决定胜负</li></ul>\n<h3>奇正相生</h3>\n<blockquote>\"凡战者，以正合，以奇胜。\"</blockquote>\n<ul><li>正面交战（正）与出奇制胜（奇）相辅相成</li><li>灵活应变，不拘一格</li></ul>\n<h3>虚实</h3>\n<blockquote>\"兵之形，避实而击虚。\"</blockquote>\n<ul><li>集中优势兵力打击敌方薄弱环节</li><li>调动敌人，使其\"无所不备，则无所不寡\"</li></ul>\n<h2>世界影响</h2>\n<ul><li>**军事领域**：拿破仑批注《孙子》，越战中美军研究孙子思想</li><li>**商界**：成为 MBA 必读书，\"商场如战场\"</li><li>**竞技体育**：战略战术的经典指南</li><li>**管理学**：\"将者，智信仁勇严也\"——领导力五要素</li></ul>\n<h2>名言</h2>\n<blockquote>\"兵者，诡道也。\" \"其疾如风，其徐如林，侵掠如火，不动如山。\" \"投之亡地然后存，陷之死地然后生。\" \"胜兵先胜而后求战，败兵先战而后求胜。\"</blockquote>\n<h2>相关条目</h2>\n<ul><li>[[hundred-schools-of-thought]] — 诸子百家（兵家）</li><li>[[spring-autumn-period]] — 春秋时代背景</li><li>[[art-of-war]] — 《孙子兵法》</li><li>[[wu-qi]] — 吴起（战国兵家代表）</li></ul>";
  C["mozi"]="<h1>墨子 (Mozi)</h1>\n<h2>基本信息</h2>\n<ul><li>**姓名**：墨翟</li><li>**生卒**：约前 468–前 376 BCE</li><li>**国籍**：宋国（一说鲁国）</li><li>**身份**：墨家学派创始人</li><li>**时代**：战国初期（在[[confucius|孔子]]之后、[[mencius|孟子]]之前）</li></ul>\n<h2>核心思想</h2>\n<h3>兼爱</h3>\n<blockquote>\"兼相爱，交相利\"——无差别地爱所有人</blockquote>\n<ul><li>反对儒家\"亲亲\"的差等之爱</li><li>被孟子批判为\"无父\"（不区分亲疏）</li><li>是战国时期最具理想主义色彩的思想</li></ul>\n<h3>非攻</h3>\n<ul><li>反对侵略战争</li><li>墨家弟子曾组织了多次**反战行动**：听闻某国要攻打另一国，墨者便赶去帮助防守</li><li>著名的\"**止楚攻宋**\"：墨子步行十日十夜至楚国，与公输班模拟攻防演示，使楚王放弃攻宋</li></ul>\n<h3>尚贤</h3>\n<ul><li>\"官无常贵，民无终贱\"——打破世袭等级</li><li>选贤任能，不论出身</li><li>比早期法家更激进地主张社会流动</li></ul>\n<h3>节用、节葬</h3>\n<ul><li>反对儒家厚葬和繁琐礼乐——\"其礼烦扰而不悦\"</li><li>主张简朴生活，反对浪费</li></ul>\n<h3>天志、明鬼</h3>\n<ul><li>相信有意志的天和鬼神</li><li>以此作为\"兼爱\"等道德原则的形而上基础</li></ul>\n<h2>科学贡献</h2>\n<p>墨家是中国古代<em>*最具科学精神的学派</em>*：</p>\n<ul><li>**光学**：《墨经》记载了小孔成像、平面镜、凸面镜、凹面镜的成像原理</li><li>**力学**：提出了力的定义、杠杆原理</li><li>**几何学**：对点、线、面、圆等有系统定义</li><li>**逻辑学**：发展了\"三表法\"——中国古代最系统的逻辑学</li></ul>\n<h2>墨家组织</h2>\n<ul><li>墨家是一个**纪律严密的半军事化组织**</li><li>首领称\"**巨子**\"，弟子必须绝对服从</li><li>弟子生活清苦，\"以裘褐为衣，以跂蹻为服\"</li><li>孟胜（墨家巨子）率弟子 183 人守城殉难——体现了墨家的牺牲精神</li></ul>\n<h2>衰落原因</h2>\n<ul><li>秦统一后墨家被视为潜在威胁遭到压制</li><li>墨家严苛的生活方式难以持续传承</li><li>儒家成为正统后，墨家作为其最主要批判对象被边缘化</li><li>但墨家\"侠\"的精神影响了后世的侠客文化</li></ul>\n<h2>名言</h2>\n<blockquote>\"兼相爱，交相利\" \"赖其力者生，不赖其力者不生\"</blockquote>\n<h2>相关条目</h2>\n<ul><li>[[confucius]] · [[mencius]] — 儒家对手</li><li>[[hundred-schools-of-thought]] — 诸子百家</li><li>[[mohism]] — 墨家学说</li></ul>";
  C["zhuangzi"]="<h1>庄子 (Zhuangzi)</h1>\n<h2>基本信息</h2>\n<ul><li>**姓名**：庄周</li><li>**生卒**：约前 369–前 286 BCE</li><li>**国籍**：宋国蒙（今河南商丘，一说安徽蒙城）</li><li>**身份**：道家代表人物，与[[laozi|老子]]并称\"**老庄**\"</li><li>**著作**：《庄子》（33 篇，其中内篇 7 篇通常认为出自庄子之手）</li><li>**时代**：战国中期</li></ul>\n<h2>生平</h2>\n<ul><li>曾为漆园小吏，后辞官隐居，终身不仕</li><li>楚威王遣使重金聘为相，庄子笑拒：</li></ul>\n<blockquote>\"吾将曳尾于涂中\"——宁愿做泥里打滚的活龟，不做庙堂上的死龟</blockquote>\n<ul><li>一生贫困，\"处穷闾厄巷，困窘织屦\"</li><li>妻子去世时\"**鼓盆而歌**\"——体现超然生死观</li></ul>\n<h2>核心思想</h2>\n<h3>逍遥游</h3>\n<blockquote>\"若夫乘天地之正，而御六气之辩，以游无穷者，彼且恶乎待哉\"</blockquote>\n<ul><li>追求精神的绝对自由</li><li>超越世俗的功名利禄、是非善恶</li><li>\"至人无己，神人无功，圣人无名\"</li></ul>\n<h3>齐物论</h3>\n<blockquote>\"天地与我并生，而万物与我为一\"</blockquote>\n<ul><li>消解一切对立：大小、美丑、生死、是非</li><li>\"**庄周梦蝶**\"—不知庄周梦为蝴蝶，还是蝴蝶梦为庄周</li><li>认识论的相对主义：\"彼亦一是非，此亦一是非\"</li></ul>\n<h3>庖丁解牛</h3>\n<blockquote>\"以无厚入有间，恢恢乎其于游刃必有余地矣\"</blockquote>\n<ul><li>顺应自然规律，游刃有余</li><li>道在技术中体现——与[[laozi|老子]]的\"道\"相比更生活化</li></ul>\n<h3>无用之用</h3>\n<blockquote>\"人皆知有用之用，而莫知无用之用也\"</blockquote>\n<ul><li>大树因\"不材\"而得以长寿——\"无用\"反而是最大的\"有用\"</li><li>对功利主义的深刻反思</li></ul>\n<h2>文风特色</h2>\n<p>庄子的文风在中国文学史上独树一帜：</p>\n<ul><li>**寓言**为主：鲲鹏、朝三暮四、邯郸学步、望洋兴叹等</li><li>想象力**汪洋恣肆**，被誉为\"**天下第一才子书**\"</li><li>鲁迅：\"其文则汪洋辟阖，仪态万方，晚周诸子之作，莫能先也\"</li></ul>\n<h2>与老子的异同</h2>\n<table><tr><th>维度</th><th>老子</th><th>庄子</th></tr><tr><td>核心关注</td><td>治国之道（\"君人南面之术\"）</td><td>个人解脱</td></tr><tr><td>风格</td><td>精炼深刻（五千言）</td><td>恣肆汪洋</td></tr><tr><td>对人世</td><td>有政治关怀</td><td>超然退隐</td></tr><tr><td>方法论</td><td>辩证</td><td>相对主义</td></tr></table>\n<h2>后世影响</h2>\n<ul><li>魏晋玄学以\"三玄\"（老、庄、易）为核心</li><li>影响中国文学（陶渊明、李白、苏轼）</li><li>影响中国艺术（山水画、书法中的\"逸品\"）</li><li>与儒家入世互补，形成\"儒道互补\"的中国精神结构</li></ul>\n<h2>名言</h2>\n<blockquote>\"吾生也有涯，而知也无涯\" \"相濡以沫，不如相忘于江湖\" \"子非鱼，安知鱼之乐\" \"人生天地之间，若白驹之过郤，忽然而已\"</blockquote>\n<h2>相关条目</h2>\n<ul><li>[[laozi]] — 老子（道家创始）</li><li>[[hundred-schools-of-thought]] — 诸子百家</li><li>[[confucius]] — 孔子（儒道对比）</li></ul>";
  C["mencius"]="<h1>孟子 (Mencius)</h1>\n<h2>基本信息</h2>\n<ul><li>**姓名**：孟轲，字子舆</li><li>**生卒**：约前 372–前 289 BCE</li><li>**国籍**：邹国（今山东邹城，邻近鲁国）</li><li>**身份**：儒家代表人物，被尊为\"**亚圣**\"</li><li>**著作**：《孟子》（七篇）</li><li>**时代**：战国中期</li></ul>\n<h2>生平</h2>\n<ul><li>受业于子思（孔子之孙）的弟子</li><li>学成后游说齐、梁（魏）、宋、滕等国</li><li>对梁惠王、齐宣王等宣传仁政主张</li><li>但战国君主急于富国强兵，孟子的理想主义方案不被接受</li><li>晚年退居著书，与弟子万章等作《孟子》七篇</li></ul>\n<h2>核心思想</h2>\n<h3>性善论</h3>\n<blockquote>\"人之性善也，犹水之就下也\"</blockquote>\n<ul><li>人性本善——与荀子的性恶论形成儒家内部两大分支</li><li>人皆有\"四端\"：恻隐之心（仁）、羞恶之心（义）、辞让之心（礼）、是非之心（智）</li><li>恶来自后天环境和选择</li></ul>\n<h3>仁政</h3>\n<blockquote>\"以不忍人之心，行不忍人之政\"</blockquote>\n<ul><li>民本思想：\"**民为贵，社稷次之，君为轻**\"</li><li>反对霸道（武力统治），主张王道（道德感化）</li><li>提出\"制民之产\"——给予百姓恒产（土地），使其安居乐业</li><li>\"**五亩之宅，树之以桑**，五十者可以衣帛矣\"</li></ul>\n<h3>浩然之气</h3>\n<blockquote>\"我善养吾浩然之气\"</blockquote>\n<ul><li>道德修养论</li><li>\"富贵不能淫，贫贱不能移，威武不能屈\"——大丈夫的标准</li></ul>\n<h3>革命权</h3>\n<blockquote>\"闻诛一夫纣矣，未闻弑君也\"</blockquote>\n<ul><li>暴君可以被推翻——对儒家正统的激进化发展</li><li>朱元璋读《孟子》大怒，曾下令删节</li></ul>\n<h2>论辩风格</h2>\n<p>孟子与[[confucius|孔子]]不同，长于<em>*论辩</em>*，以雄辩著称：</p>\n<ul><li>与梁惠王辩\"利vs义\"</li><li>与告子辩人性（\"人性之无分于善不善也，犹水之无分于东西也\"）</li><li>《孟子》中充满了精彩的对话和比喻（\"五十步笑百步\"、\"揠苗助长\"）</li></ul>\n<h2>后世影响</h2>\n<ul><li>宋代升至\"亚圣\"地位，仅次于孔子</li><li>《孟子》被朱熹列为\"四书\"之一</li><li>明清科举必考</li><li>黄宗羲等明清思想家继承发扬其民本思想</li></ul>\n<h2>名言</h2>\n<blockquote>\"民为贵，社稷次之，君为轻\" \"天将降大任于是人也，必先苦其心志\" \"老吾老以及人之老，幼吾幼以及人之幼\" \"穷则独善其身，达则兼善天下\"</blockquote>\n<h2>相关条目</h2>\n<ul><li>[[confucius]] — 孔子</li><li>[[hundred-schools-of-thought]] — 诸子百家</li><li>[[xunzi]] — 荀子（性恶论对手）</li></ul>";
  C["guan-zhong"]="<h1>管仲</h1>\n<h2>基本信息</h2>\n<ul><li>**姓名**：管夷吾，字仲</li><li>**生卒**：？–前 645 BCE</li><li>**国籍**：齐国</li><li>**身份**：齐国国相、改革家</li><li>**时代**：春秋早期（齐桓公时期）</li><li>**被尊为**：\"**管子**\"、**法家先驱**</li></ul>\n<h2>生平</h2>\n<h3>管鲍之交</h3>\n<ul><li>管仲与**鲍叔牙**为至交</li><li>早年一起经商，管仲分钱时多取，鲍叔牙知其家贫不以为贪</li><li>齐国内乱时，管仲辅公子纠，鲍叔牙辅公子小白（后来的齐桓公）</li><li>管仲曾射伤公子小白（箭中带钩），差点杀死他</li><li>齐桓公即位后，鲍叔牙力荐管仲：\"**君且欲霸王，非管夷吾不可**\"</li><li>齐桓公**不计前嫌**重用管仲为相</li></ul>\n<h3>管仲改革</h3>\n<p>管仲在中国历史上首次进行了系统性的国家改革：</p>\n<table><tr><th>领域</th><th>内容</th></tr><tr><td>**行政**</td><td>\"叁其国而伍其鄙\"——分国都21乡，农村5属，加强管理</td></tr><tr><td>**军事**</td><td>\"作内政而寄军令\"——军政合一，寓兵于民</td></tr><tr><td>**经济**</td><td>\"官山海\"——**盐铁国家专营**的开创者；\"相地而衰征\"——按土地好坏征税</td></tr><tr><td>**外交**</td><td>\"**尊王攘夷**\"——尊重周天子，团结诸侯抵抗戎狄</td></tr><tr><td>**社会**</td><td>士农工商四民分业，不许杂处——最早的职业分区制</td></tr></table>\n<h3>外交成就</h3>\n<ul><li>尊王攘夷策略使齐国获得道义制高点</li><li>召陵之盟（前656 BCE）：率八国联军迫使楚国承认周天子权威</li><li>葵丘之会（前651 BCE）：齐桓公霸业顶峰</li></ul>\n<h2>思想贡献</h2>\n<h3>《管子》</h3>\n<ul><li>托名管仲的著作，实际成书于战国至汉代</li><li>内容涵盖政治、经济、军事、哲学</li><li>**\"仓廪实则知礼节，衣食足则知荣辱\"**——朴素唯物主义名言</li><li>提出\"轻重之术\"——国家通过调节市场物价来控制经济</li></ul>\n<h3>法家先驱</h3>\n<ul><li>管仲是中国法治思想的早期实践者</li><li>\"以法治国\"最早见于《管子》</li><li>影响了后来的[[shang-yang|商鞅]]、[[han-fei|韩非]]等法家人物</li></ul>\n<h2>评价与影响</h2>\n<ul><li>**孔子**：高度评价管仲——\"微管仲，吾其被发左衽矣\"（没有管仲，我们都成了蛮夷）</li><li>**诸葛亮**：\"每自比于管仲、乐毅\"</li><li>被后世视为**改革家的典范**和**贤相的楷模**</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[state-qi]] — 齐国</li><li>[[spring-autumn-period]] — 春秋时代</li><li>[[shang-yang]] — 商鞅（后来的改革者）</li><li>[[hundred-schools-of-thought|诸子百家]]</li></ul>";
  C["shang-yang"]="<h1>商鞅</h1>\n<h2>基本信息</h2>\n<ul><li>**姓名**：公孙鞅，后封于商，称商鞅</li><li>**生卒**：约前 390–前 338 BCE</li><li>**国籍**：卫国（出生）→ 魏国（仕途起点）→ 秦国（变法）</li><li>**身份**：法家代表人物、改革家、秦国大良造</li><li>**时代**：战国中期（秦孝公时期）</li></ul>\n<h2>生平</h2>\n<h3>入秦</h3>\n<ul><li>商鞅本是卫国公族后裔，早年仕于魏国</li><li>在魏相公叔痤手下任中庶子，深受赏识</li><li>公叔痤临终向魏惠王推荐商鞅，又建议\"不用则杀之\"——魏王均不听从</li><li>闻秦孝公求贤，携带**李悝《法经》**西行入秦</li><li>四次游说秦孝公，先讲帝道、王道，秦孝公昏昏欲睡</li><li>最后讲**霸道、强国之术**，秦孝公\"语数日不厌\"</li></ul>\n<h3>变法（前 356、前 350 BCE 两次）</h3>\n<p>商鞅变法是中国古代<em>*最彻底、影响最深远的改革</em>*：</p>\n<table><tr><th>领域</th><th>改革内容</th></tr><tr><td>**政治**</td><td>推行县制（31 县）；编定户籍；什伍连坐</td></tr><tr><td>**军事**</td><td>**二十等爵制**：以军功授爵——\"宗室非有军功，不得为属籍\"</td></tr><tr><td>**经济**</td><td>\"废井田，开阡陌\"——承认土地私有；重农抑商</td></tr><tr><td>**社会**</td><td>分户令——强制成年男子分家；统一度量衡</td></tr><tr><td>**法律**</td><td>\"刑无等级\"——法律面前人人平等；轻罪重罚</td></tr></table>\n<h3>徙木立信</h3>\n<ul><li>变法之初，为取信于民</li><li>在国都南门立一根三丈之木，悬赏十金让人搬至北门</li><li>无人敢搬，加至五十金</li><li>有人尝试，立刻兑现——从此**法令必行**</li></ul>\n<h3>太子犯法</h3>\n<ul><li>太子（后来的秦惠文王）犯法</li><li>商鞅不能直接处罚太子，便处罚其师傅：**公子虔割鼻、公孙贾黥面**</li><li>\"法之不行，自上犯之\"——这个原则使秦法严明</li></ul>\n<h2>结局</h2>\n<ul><li>前 338 年，秦孝公去世，太子即位为秦惠文王</li><li>公子虔等旧贵族诬告商鞅谋反</li><li>商鞅逃亡，投宿旅店，因无证件被拒——**\"作法自毙\"**</li><li>起兵抵抗失败，被秦军杀死于彤地</li><li>车裂尸体示众，**灭其家族**</li></ul>\n<blockquote>**但商鞅虽死，秦法未变。** 秦国沿着商鞅开辟的道路继续前进，最终统一天下。</blockquote>\n<h2>评价</h2>\n<ul><li>**韩非**：推崇商鞅为法家典范</li><li>**司马迁**：批评商鞅\"刻薄少恩\"，但承认其变法使秦国富强</li><li>**后世**：商鞅是中国改革史上最重要的人物之一；其\"以法治国\"思想影响深远</li></ul>\n<h2>名言</h2>\n<blockquote>\"治世不一道，便国不法古\"——改革不必遵循旧制</blockquote>\n<blockquote>\"法之不行，自上犯之\"——法律失效源于上层破坏</blockquote>\n<h2>相关条目</h2>\n<ul><li>[[state-qin]] — 秦国</li><li>[[warring-states-period]] — 战国时代</li><li>[[guan-zhong]] — 管仲（更早的改革家）</li><li>[[han-fei]] — 韩非（法家理论集大成者）</li><li>[[shang-yang-reforms]] — 商鞅变法（制度详析）</li></ul>";
  C["wu-qi"]="<h1>吴起 (Wu Qi)</h1>\n<h2>基本信息</h2>\n<ul><li>**姓名**：吴起</li><li>**生卒**：？–前 381 BCE</li><li>**国籍**：卫国（出生）→ 鲁国 → 魏国 → [[state-chu|楚国]]</li><li>**身份**：军事家、改革家</li><li>**著作**：《吴子》（或称《吴起兵法》）</li></ul>\n<h2>早年争议</h2>\n<ul><li>为求仕途**耗尽家财**，乡人嘲笑，一口气杀了三十多个嘲笑者</li><li>离家时咬臂对母亲发誓：\"不为卿相，不复入卫\"</li><li>母亲去世时吴起不回家奔丧，师从曾子（孔子弟子），曾子因其不孝与之绝交</li><li>\"杀妻求将\"：齐国攻鲁时，吴起为表忠诚杀了齐国籍的妻子——**千古争议**</li></ul>\n<h2>魏国时期：魏武卒</h2>\n<ul><li>魏文侯任用吴起为将，\"**与士卒最下者同衣食**\"</li><li>为伤兵**吮吸脓疮**，士兵之母痛哭：\"往年吴公吮其父，父战不旋踵遂死于敌\"</li><li>创建**魏武卒**——战国最强精锐重装步兵</li><li>选拔标准：\"衣三属之甲，操十二石之弩\"</li><li>全副武装负重半日行军百里</li><li>**大战七十六，全胜六十四**，其余平局</li><li>镇守西河，秦国不敢东向</li></ul>\n<h2>楚国变法</h2>\n<ul><li>遭魏相公叔痤排挤，逃往楚国</li><li>楚悼王重用吴起为令尹（相当于相），推行变法：</li><li>废除贵族特权，\"**封君之子孙三世而收爵禄**\"</li><li>裁汰冗官，节省开支养军</li><li>整顿吏治，\"**使私不害公**\"</li></ul>\n<h2>惨烈结局</h2>\n<ul><li>前 381 年楚悼王去世</li><li>被变法触怒的楚国旧贵族趁吴起吊丧时**围攻**</li><li>吴起逃至楚悼王尸体旁，伏于尸上</li><li>贵族乱箭射杀吴起，箭矢也射中了楚悼王的尸体</li><li>新即位的楚肃王以\"丽兵于王尸\"之罪，**灭七十余家**——吴起以死复仇</li><li>但吴起变法也随他人亡而政息</li></ul>\n<h2>评价</h2>\n<ul><li>军事上：与孙武并称\"孙吴\"——古代军事家的最高代表</li><li>但\"杀妻求将\"、\"母丧不归\"使其为儒家传统所不齿</li><li>司马迁：\"以刻暴少恩亡其躯\"——性格决定命运</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[state-wei]] — 魏国</li><li>[[state-chu]] — 楚国</li><li>[[sun-tzu]] — 孙武</li><li>[[shang-yang]] — 商鞅（同样变法而死的改革家）</li></ul>";
  C["han-fei"]="<h1>韩非 (Han Fei)</h1>\n<h2>基本信息</h2>\n<ul><li>**姓名**：韩非</li><li>**生卒**：约前 280–前 233 BCE</li><li>**国籍**：韩国公子</li><li>**身份**：法家思想的**集大成者**</li><li>**师从**：荀子（儒家，但走向法家）</li><li>**著作**：《韩非子》（55 篇）</li><li>**时代**：战国末期</li></ul>\n<h2>核心思想</h2>\n<p>韩非综合了商鞅的\"法\"、申不害的\"术\"、慎到的\"势\"，构建了完整的法家理论体系：</p>\n<h3>法（法律）</h3>\n<blockquote>\"法者，编著之图籍，设之于官府，而布之于百姓者也\"</blockquote>\n<ul><li>法律必须**公开、明确、普遍适用**</li><li>\"法不阿贵\"——法律面前人人平等</li><li>\"刑过不避大臣，赏善不遗匹夫\"</li></ul>\n<h3>术（权术）</h3>\n<blockquote>\"术者，因任而授官，循名而责实\"</blockquote>\n<ul><li>君主驾驭群臣的权术和考核方法</li><li>听言察实，\"一听责下\"——逐一考察，防止蒙蔽</li></ul>\n<h3>势（权威）</h3>\n<blockquote>\"抱法处势则治，背法去势则乱\"</blockquote>\n<ul><li>君主必须牢牢掌握权力</li><li>权力是推行法治的基础</li></ul>\n<h3>人性论</h3>\n<ul><li>继承荀子性恶论，推向极端</li><li>人性自私自利，\"好利恶害\"</li><li>君臣之间是**利益交换**关系：\"臣尽死力以与君市，君垂爵禄以与臣市\"</li></ul>\n<h3>五蠹</h3>\n<p>韩非提出危害国家的五种人（\"五蠹\"）：</p>\n<ol><li>学者（称颂先王、扰乱法治）</li><li>言谈者（纵横家，空谈外交）</li><li>带剑者（游侠，私斗犯禁）</li><li>患御者（逃避兵役者）</li><li>商工之民（囤积居奇）</li></ol>\n<blockquote>\"儒以文乱法，侠以武犯禁\"——名言</blockquote>\n<h2>命运</h2>\n<ul><li>韩非多次上书韩王请求变法，不被采纳</li><li>著作传入秦国，秦王嬴政读后感叹：\"**寡人得见此人与之游，死不恨矣**\"</li><li>秦攻韩，韩王派韩非出使秦国</li><li>同门**李斯**（也是荀子学生）嫉妒韩非之才，向秦王进谗言</li><li>韩非被下狱，李斯送毒药令其**自杀**</li><li>嬴政后悔时已来不及</li></ul>\n<blockquote>法家集大成者死在自己同学之手——韩非与李斯的悲剧</blockquote>\n<h2>历史影响</h2>\n<ul><li>韩非的思想被秦始皇和李斯付诸实践</li><li>\"外儒内法\"——此后两千年中国政治的隐性逻辑</li><li>韩非是**中国法治思想**（rule of law）最重要的古代理论家</li><li>毛泽东多次提及韩非：\"历代有作为的政治家都是法家\"</li></ul>\n<h2>名言</h2>\n<blockquote>\"以法为教，以吏为师\" \"刑过不避大臣，赏善不遗匹夫\" \"千里之堤，溃于蚁穴\" \"不期修古，不法常可\"</blockquote>\n<h2>相关条目</h2>\n<ul><li>[[shang-yang]] — 商鞅（法派）</li><li>[[hundred-schools-of-thought]] — 诸子百家</li><li>[[legalism-philosophy]] — 法家思想</li><li>[[li-si]] — 李斯</li><li>[[qin-shi-huang]] — 秦始皇</li></ul>";
  C["bai-qi"]="<h1>白起 (Bai Qi)</h1>\n<h2>基本信息</h2>\n<ul><li>**姓名**：白起</li><li>**生卒**：？–前 257 BCE</li><li>**国籍**：[[state-qin|秦国]]</li><li>**身份**：秦国名将，封武安君</li><li>**绰号**：**\"人屠\"**——一生杀敌近百万人</li><li>**战绩**：三十余年征战，**未尝一败**</li></ul>\n<h2>军事成就</h2>\n<h3>伊阙之战（前 293 BCE）</h3>\n<ul><li>秦将白起攻韩、魏联军于伊阙（今洛阳南）</li><li>斩首**二十四万**——一战成名</li></ul>\n<h3>鄢郢之战（前 279–前 278 BCE）</h3>\n<ul><li>攻楚国，水灌鄢城，淹死数十万军民</li><li>攻破楚国都城**郢**，楚被迫迁都</li><li>屈原闻此投江</li></ul>\n<h3>长平之战（前 260 BCE）</h3>\n<p>中国军事史上最惨烈的战役：</p>\n<ul><li>秦赵在长平对峙三年</li><li>秦用反间计使赵王以**赵括**代廉颇</li><li>秦昭襄王秘遣白起为主将</li><li>白起佯败诱敌，赵括全军追击</li><li>以 2.5 万骑兵**切断赵军后路和粮道**</li><li>赵军断粮 46 天，**人相食**</li><li>赵括率精锐突围被射杀</li><li>赵军投降，白起下令**坑杀全部降卒**</li><li>仅放回 240 名少年兵回赵国报信</li><li>**前后斩首坑杀赵卒四十五万**</li></ul>\n<blockquote>\"赵氏壮者皆尽长平\"——《史记》</blockquote>\n<h2>结局</h2>\n<ul><li>前 258 年秦再攻赵邯郸，白起认为战机已失，拒不出战</li><li>秦昭襄王和范雎猜忌，剥夺其官爵</li><li>驱逐出咸阳，至杜邮（今西安附近）</li><li>秦昭襄王派使者赐剑令其**自裁**</li><li>白起仰天长叹：\"我何罪于天而至此哉？……长平之战，赵卒降者数十万人，我诈而尽坑之，是足以死\"</li><li>引剑**自杀**</li></ul>\n<h2>\"人屠\"评价</h2>\n<ul><li>**千秋争议**：坑杀降卒是战争罪还是\"兵不厌诈\"？</li><li>司马迁在《史记》中为白起单独立传</li><li>后世\"杀神\"形象的来源——小说和游戏中常被描绘为冷酷的战神</li><li>长平古战场至今仍有\"杀谷\"地名和万人坑遗址</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[state-qin]] — 秦国</li><li>[[warring-states-period]] — 战国时代</li><li>[[battle-of-changping]] — 长平之战</li><li>[[state-zhao]] — 赵国</li><li>[[qin-shi-huang]] — 秦始皇</li></ul>";
  C["sun-bin"]="<h1>孙膑 (Sun Bin)</h1>\n<h2>基本信息</h2>\n<ul><li>**姓名**：孙膑（本名不详，\"膑\"是被挖去膝盖骨后得的绰号）</li><li>**生卒**：约前 380–前 316 BCE</li><li>**国籍**：[[state-qi|齐国]]（生于齐、阿、鄄之间）</li><li>**身份**：军事家、兵家代表人物</li><li>**著作**：《孙膑兵法》（《齐孙子》）</li><li>**师出**：传说师从鬼谷子，与庞涓同学</li><li>**与[[sun-tzu|孙武]]关系**：孙武后代（《史记》记载）</li></ul>\n<h2>受刑</h2>\n<ul><li>孙膑与**庞涓**同学兵法，庞涓先仕于魏国，任将军</li><li>庞涓嫉妒孙膑之才，将其骗至魏国</li><li>诬陷孙膑，处以**膑刑**（挖去膝盖骨）和**黥刑**（脸上刺字）</li><li>孙膑装疯卖傻，在齐国使者帮助下逃回齐国</li></ul>\n<h2>军事成就</h2>\n<h3>桂陵之战（前 354 BCE）——围魏救赵</h3>\n<ul><li>魏将庞涓率军围攻赵都邯郸</li><li>齐威王派田忌为将、孙膑为军师救赵</li><li>孙膑不直接救援赵国，而是**直扑魏国都城大梁**</li><li>庞涓被迫回师救援，在**桂陵**被齐军伏击大败</li><li>\"**围魏救赵**\"成为经典军事策略</li></ul>\n<h3>马陵之战（前 342 BCE）——减灶诱敌</h3>\n<ul><li>魏攻韩，齐再出兵</li><li>孙膑用**减灶计**：第一天设灶十万，第二天减至五万，第三天三万</li><li>制造齐军大量逃亡的假象，诱使庞涓轻敌追击</li><li>在马陵道设伏，剥树皮书\"**庞涓死于此树之下**\"</li><li>庞涓追至，齐军万弩齐发，魏军覆没</li><li>庞涓**自杀**，孙膑报仇雪恨</li></ul>\n<h2>《孙膑兵法》</h2>\n<ul><li>失传千年，1972 年在山东临沂**银雀山汉墓**与《孙子兵法》同时出土</li><li>证实了历史上确实存在\"吴孙子\"（孙武）和\"齐孙子\"（孙膑）两部兵书</li><li>核心思想：**\"必攻不守\"**——主动进攻</li></ul>\n<h2>名言</h2>\n<blockquote>\"围魏救赵\"——间接路线的经典 \"善战者，因其势而利导之\"</blockquote>\n<h2>相关条目</h2>\n<ul><li>[[sun-tzu]] — 孙武（祖父辈）</li><li>[[warring-states-period]] — 战国时代</li><li>[[state-qi]] · [[state-wei]]</li></ul>";
  C["qin-shi-huang"]="<h1>秦始皇 (嬴政)</h1>\n<h2>基本信息</h2>\n<ul><li>**姓名**：嬴政（赵政）</li><li>**生卒**：前 259–前 210 BCE（49 岁）</li><li>**在位**：前 247 年即位（13 岁），前 221 年称始皇帝</li><li>**身份**：秦庄襄王之子，中国**第一个皇帝**</li><li>**时代**：战国末期→秦朝</li></ul>\n<h2>统一六国</h2>\n<p>从 <em>*前 230 年</em><em>到</em><em>前 221 年</em>*，十年间：</p>\n<table><tr><th>年份</th><th>灭国</th><th>备注</th></tr><tr><td>前 230</td><td>灭韩</td><td>首灭</td></tr><tr><td>前 228</td><td>灭赵</td><td>邯郸破</td></tr><tr><td>前 225</td><td>灭魏</td><td>水淹大梁</td></tr><tr><td>前 223</td><td>灭楚</td><td>王翦六十万大军</td></tr><tr><td>前 222</td><td>灭燕</td><td>辽东追击</td></tr><tr><td>前 221</td><td>灭齐</td><td>**天下统一**</td></tr></table>\n<h2>大一统制度</h2>\n<h3>中央集权</h3>\n<ul><li>废除封建，全面推行**郡县制**（36 郡）</li><li>中央设**三公九卿**：丞相、太尉、御史大夫</li><li>**皇帝**称号：取\"三皇五帝\"各一字，\"朕\"为皇帝专称</li></ul>\n<h3>统一标准</h3>\n<ul><li>**书同文**：小篆统一文字（李斯）</li><li>**车同轨**：统一车轨宽度</li><li>**统一度量衡**</li><li>**统一货币**：圆形方孔钱（秦半两）</li></ul>\n<h3>重大工程</h3>\n<ul><li>**驰道**：以咸阳为中心的全国交通网</li><li>**灵渠**：连接长江和珠江水系</li><li>**长城**：连接北方各国长城，防御匈奴</li><li>**阿房宫**、**骊山陵墓**（兵马俑）</li></ul>\n<h2>思想控制</h2>\n<h3>焚书坑儒（前 213、前 212 BCE）</h3>\n<ul><li>李斯建议焚烧除秦记、医药、卜筮、种树之外的所有书籍</li><li>坑杀\"诽谤\"秦始皇的方士儒生 460 余人</li><li>中国文化史上最大的浩劫之一</li></ul>\n<h2>评价</h2>\n<h3>正面</h3>\n<ul><li>结束五百余年分裂，**缔造统一国家**</li><li>确立了中国两千年的**大一统制度框架**</li><li>\"百代皆行秦政法\"——毛泽东</li></ul>\n<h3>负面</h3>\n<ul><li>严刑峻法、\"乐以刑杀为威\"</li><li>徭役繁重、民不聊生</li><li>焚书坑儒、毁灭文化</li><li>统一 15 年即**二世而亡**</li></ul>\n<h2>争议</h2>\n<ul><li>**吕不韦与嬴政的关系**：\"奇货可居\"的传说</li><li>秦始皇可能不是庄襄王亲生——《史记》记载为吕不韦之子</li><li>但此说争议极大，可能为后世抹黑</li></ul>\n<h2>历史遗产</h2>\n<ul><li>中国版图的基本框架</li><li>皇帝制度和专制政体——至 1911 年</li><li>兵马俑——世界第八大奇迹</li><li>\"China\"一词可能源于\"秦\"（Chin/Qin）</li></ul>\n<h2>名言</h2>\n<blockquote>\"朕为始皇帝，后世以计数，二世三世至于万世，传之无穷\" （焚书理由）：\"今诸生不师今而学古，以非当世，惑乱黔首\"</blockquote>\n<h2>相关条目</h2>\n<ul><li>[[state-qin]] — 秦国</li><li>[[warring-states-period]] — 战国时代</li><li>[[qin-dynasty]] — 秦朝</li><li>[[li-si]] — 李斯（丞相）</li><li>[[burning-books-burying-scholars]] — 焚书坑儒</li></ul>";
  C["qu-yuan"]="<h1>屈原 (Qu Yuan)</h1>\n<h2>基本信息</h2>\n<ul><li>**姓名**：屈平，字原</li><li>**生卒**：约前 340–前 278 BCE</li><li>**国籍**：[[state-chu|楚国]]贵族</li><li>**身份**：楚国左徒、三闾大夫、诗人</li><li>**著作**：《离骚》《九歌》《天问》《九章》等</li><li>**时代**：战国后期（楚怀王时期）</li></ul>\n<h2>生平</h2>\n<h3>楚怀王时期</h3>\n<ul><li>屈原出身楚国贵族，\"博闻强志，明于治乱，娴于辞令\"</li><li>深得楚怀王信任，任**左徒**，\"入则与王图议国事，以出号令\"</li><li>主张**联齐抗秦**，改革内政</li><li>遭上官大夫靳尚等谗言陷害，被楚怀王疏远</li></ul>\n<h3>放逐</h3>\n<ul><li>秦派张仪以割地六百里为诱饵，骗楚与齐绝交</li><li>楚怀王发觉受骗后怒而攻秦，大败</li><li>屈原一再劝谏不要信任秦国，楚怀王不听</li><li>被放逐至汉北（后又流放至江南）</li></ul>\n<h3>沉江</h3>\n<ul><li>前 278 年，秦将白起攻破楚国都城**郢**</li><li>屈原闻讯，在悲愤中写下《**怀沙**》</li><li>农历**五月初五**，怀抱大石投**汨罗江**自沉</li><li>百姓划船拯救未果，投粽子入水以防鱼食其体——**端午节**的起源传说</li></ul>\n<h2>文学成就</h2>\n<h3>《离骚》</h3>\n<ul><li>中国文学史上**第一首长篇抒情诗**（373 句）</li><li>\"路漫漫其修远兮，吾将上下而求索\"</li><li>以香草美人比喻理想，以恶草小人比喻奸邪</li><li>开创了\"**骚体**\"文学传统</li></ul>\n<h3>《九歌》</h3>\n<ul><li>祭祀神祇的乐歌，描绘楚地巫风民俗</li><li>《湘君》《湘夫人》《山鬼》等篇意境幽远</li><li>浪漫主义色彩浓郁</li></ul>\n<h3>《天问》</h3>\n<ul><li>向天发问 170 多个问题</li><li>涉及宇宙起源、神话传说、历史兴亡</li><li>展现了中国古人最深邃的思辨精神</li></ul>\n<h2>\"香草美人\"传统</h2>\n<p>屈原开创了中国文学的<em>*比兴传统</em>*：</p>\n<ul><li>**香草**——象征君子的美德</li><li>**美人**——比喻理想的君主或自身</li><li>**恶草**——象征小人奸邪</li><li>这种隐喻系统影响了后世所有中国诗人</li></ul>\n<h2>历史地位</h2>\n<ul><li>**中国第一位有名有姓的诗人**（之前的《诗经》多为集体创作或佚名）</li><li>**浪漫主义文学的始祖**</li><li>\"屈平辞赋悬日月\"——李白</li><li>端午节、龙舟竞渡的文化符号</li><li>被列为**世界四大文化名人**之一（1953 年世界和平理事会）</li></ul>\n<h2>名言</h2>\n<blockquote>\"路漫漫其修远兮，吾将上下而求索\" \"亦余心之所善兮，虽九死其犹未悔\" \"长太息以掩涕兮，哀民生之多艰\" \"举世皆浊我独清，众人皆醉我独醒\"</blockquote>\n<h2>相关条目</h2>\n<ul><li>[[state-chu]] — 楚国</li><li>[[warring-states-period]] — 战国时代</li><li>[[chu-ci]] — 《楚辞》</li><li>[[dragon-boat-festival]] — 端午节</li></ul>";
  C["battle-changping"]="<h1>长平之战</h1>\n<h2>概述</h2>\n<p>长平之战是战国时期规模最大、最惨烈的战役。秦赵两国投入倾国之兵，决战于长平（今山西晋城高平市）。最终秦将[[bai-qi|白起]]大获全胜，坑杀赵卒<em>*四十余万</em>*，赵国从此一蹶不振。</p>\n<h2>背景</h2>\n<ul><li>前 262 年，秦国攻韩上党，切断其与韩国本土的联系</li><li>上党郡守冯亭不愿降秦，将上党**献予赵国**</li><li>[[lord-pingyuan|平原君赵胜]]力主接受——贪一郡之地引发灭顶之灾</li><li>秦国大怒，倾全国之兵攻赵</li></ul>\n<h2>战役经过</h2>\n<h3>对峙阶段（前 262–前 260）</h3>\n<ul><li>赵将**廉颇**率军在长平筑垒固守，以逸待劳</li><li>秦将王龁猛攻，无法突破赵军防线</li><li>双方对峙三年，赵军粮草渐竭</li></ul>\n<h3>反间计</h3>\n<ul><li>秦国散布谣言：\"**秦独畏马服子赵括**\"</li><li>赵孝成王对廉颇的保守战略早已不满</li><li>以**赵括**（纸上谈兵之辈）替代廉颇</li></ul>\n<h3>白起出场</h3>\n<ul><li>秦昭襄王秘遣白起为将，军中严格保密——\"有敢泄武安君为将者斩\"</li><li>白起佯败诱敌，赵括**全军追击**</li><li>以 2.5 万精骑**切断赵军后路**，又派 5 千骑兵分割赵军</li></ul>\n<h3>围困</h3>\n<ul><li>赵军被分割包围，粮道断绝</li><li>秦王亲自到河内，征发十五岁以上男子全部从军</li><li>赵军**断粮 46 天**，人相食</li><li>赵括率精锐突围，**被秦军射杀**</li></ul>\n<h3>坑杀</h3>\n<ul><li>赵军投降，白起下令：**\"尽坑杀之\"**</li><li>仅留 240 名少年兵回赵国报信</li><li>前后斩首坑杀共**四十五万**</li></ul>\n<h2>后果</h2>\n<ul><li>\"**赵氏壮者皆尽长平**\"——赵国青壮年几乎死绝</li><li>从此赵国再无能力单独对抗秦国</li><li>秦国统一天下的最大障碍被清除</li><li>前 228 年邯郸被攻破，赵亡——长平之战是决定性起点</li></ul>\n<h2>遗址</h2>\n<p>长平之战古战场至今仍有遗迹：</p>\n<ul><li>**\"杀谷\"**地名</li><li>1995 年发现**万人坑**，尸骨堆积层厚达 2 米</li><li>山西省高平市永录村尸骨坑遗址已建成纪念馆</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[warring-states-period]] — 战国时代</li><li>[[bai-qi]] — 白起</li><li>[[state-zhao]] — 赵国</li><li>[[state-qin]] — 秦国</li><li>[[lord-pingyuan]] — 平原君</li></ul>";
  C["battle-maling"]="<h1>马陵之战</h1>\n<h2>概述</h2>\n<p>马陵之战是前 342 年齐魏之间的一场决定性战役。[[sun-bin|孙膑]]以<em>*减灶计</em><em>诱敌深入，在马陵道设伏全歼魏军，魏将</em><em>庞涓自杀</em>*。此战标志着魏国从战国首霸走向衰落。</p>\n<h2>背景</h2>\n<ul><li>前 342 年，魏国庞涓率军攻打韩国</li><li>韩国向[[state-qi|齐国]]求救</li><li>齐威王派田忌为将、孙膑为军师出兵</li></ul>\n<h2>孙膑的计策</h2>\n<h3>减灶诱敌</h3>\n<blockquote>第一天设灶十万 → 第二天减至五万 → 第三天仅三万</blockquote>\n<ul><li>制造齐军**大量逃亡**的假象</li><li>庞涓中计，以为齐军溃散，轻敌追击</li><li>下令抛弃步兵辎重，仅率精锐骑兵日夜追赶</li></ul>\n<h3>马陵伏击</h3>\n<ul><li>孙膑在马陵道狭窄处设伏</li><li>命人剥去一棵大树的树皮，在白色树干上写：\"**庞涓死于此树之下**\"</li><li>命万名弓箭手埋伏两侧，约定\"暮见火举而俱发\"</li></ul>\n<h3>庞涓之死</h3>\n<ul><li>庞涓追击至马陵道，天黑见树上有字</li><li>命人点火观看——这正是约定的信号</li><li>齐军**万弩齐发**，魏军大乱</li><li>庞涓自知智穷兵败，**拔剑自刎**</li><li>死前悲叹：\"**遂成竖子之名**\"——成就了孙膑的名声</li></ul>\n<h2>战果与影响</h2>\n<ul><li>魏国精锐**全军覆没**</li><li>太子申被俘</li><li>魏国从**战国首霸**地位急剧衰落</li><li>秦国趁机东进，魏国从此无力抗衡</li><li>齐国声威大振</li></ul>\n<h2>孙膑与庞涓的恩怨</h2>\n<p>孙膑与庞涓本是同窗，师从鬼谷子：</p>\n<ul><li>庞涓先入魏为将 → 嫉妒孙膑才学 → 诱骗孙膑来魏 → **挖去其膝盖骨**</li><li>孙膑装疯逃脱 → 入齐 → 桂陵之战败庞涓（围魏救赵）→ 马陵之战再败 → 庞涓自杀</li><li>这是一个完美的**复仇故事**——被害→幸存→两次击败加害者</li></ul>\n<h2>军事意义</h2>\n<ul><li>**减灶计**成为\"示弱诱敌\"的经典战例</li><li>\"知彼知己\"——庞涓以为了解孙膑（齐军怯战），孙膑更了解庞涓（骄傲轻敌）</li><li>体现了\"因势利导\"的军事智慧</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[sun-bin]] — 孙膑</li><li>[[state-wei]] — 魏国</li><li>[[state-qi]] — 齐国</li><li>[[warring-states-period]] — 战国时代</li><li>[[guiguzi]] — 鬼谷子</li></ul>\n<h2>与桂陵之战的对比</h2>\n<table><tr><th>维度</th><th>桂陵 (前354)</th><th>马陵 (前342)</th></tr><tr><td>策略</td><td>围魏救赵</td><td>减灶诱敌</td></tr><tr><td>结果</td><td>魏军大败</td><td>魏军覆没</td></tr><tr><td>庞涓</td><td>被俘（后放归）</td><td>自杀</td></tr><tr><td>后果</td><td>魏受重创</td><td>魏衰落转折</td></tr></table>";
  C["mandate-heaven"]="<h1>天命观 (Mandate of Heaven)</h1>\n<h2>核心定义</h2>\n<p>天命观是周朝建立的政治哲学核心，认为上天（天帝）将统治权授予有德之君，如果君主失德，天将收回天命，改授予他人。这一思想深刻影响了此后三千年的中国政治文化。</p>\n<h2>理论构成</h2>\n<h3>三大原则</h3>\n<table><tr><th>原则</th><th>原文</th><th>含义</th></tr><tr><td>天命靡常</td><td>\"天命靡常\"（《诗经》）</td><td>天命不固定于某一家族，可能转移</td></tr><tr><td>以德配天</td><td>\"皇天无亲，惟德是辅\"（《尚书》）</td><td>只有具备德行的君主才能获得天命</td></tr><tr><td>天听自我民听</td><td>\"天视自我民视，天听自我民听\"（《尚书》）</td><td>天意通过民意体现</td></tr></table>\n<h3>运作逻辑</h3>\n<pre><code>君主有德 → 天授命 → 国泰民安\n    ↓\n君主失德 → 天降灾异 → 革命 → 新王朝建立</code></pre>\n<h2>历史背景</h2>\n<p><em>*为何周朝需要天命观？</em>*</p>\n<p>周原本是商的属国（西伯），以武力推翻商朝后需要合法性解释：</p>\n<ul><li>商朝信仰\"上帝\"庇护商人</li><li>周人需要论证：为何上帝不再保护商，转而支持周？</li><li>答案：**商纣失德，天弃商；周武王有德，天授命于周**</li></ul>\n<p>这是中国历史上第一次系统性的权力转移合法性论证。</p>\n<h2>历史影响</h2>\n<h3>政治功能</h3>\n<ol><li>**合法性来源**：此后历代开国君主均声称\"受命于天\"</li><li>**约束机制**：对现任君主形成道德约束——\"失德则可能失天下\"</li><li>**革命正当性**：为改朝换代提供理论依据（\"汤武革命，顺乎天而应乎人\"）</li><li>**灾异政治**：自然灾害被解读为\"天谴\"，引发政策调整</li></ol>\n<h3>与西方对比</h3>\n<table><tr><th>维度</th><th>中国天命观</th><th>欧洲君权神授</th></tr><tr><td>天命的稳定性</td><td>**有条件**（以德配天）</td><td>无条件（神选定即不可挑战）</td></tr><tr><td>革命权</td><td>理论上有\"革命\"空间</td><td>不允许</td></tr><tr><td>民意角色</td><td>天通过民意表达</td><td>君权独立于民意</td></tr><tr><td>最终裁判</td><td>历史结果（成王败寇）</td><td>教皇/教会</td></tr></table>\n<h3>后世演变</h3>\n<ul><li>**汉代**：董仲舒将天命与阴阳五行结合，形成天人感应论</li><li>**宋明**：理学将天命内化为\"天理\"</li><li>**明清**：皇权绝对化趋势削弱了天命对君主的约束力</li><li>**近代**：清末革命仍借用\"天命\"话语（\"驱除鞑虏，恢复中华\"）</li></ul>\n<h2>关键原文</h2>\n<blockquote>\"皇天上帝，改厥元子兹大国殷之命。惟王受命，无疆惟休，亦无疆惟恤。\" ——《尚书·召诰》</blockquote>\n<blockquote>\"天矜于民，民之所欲，天必从之。\" ——《尚书·泰誓》</blockquote>\n<h2>相关条目</h2>\n<ul><li>[[zhou-dynasty]] — 周朝（天命观诞生背景）</li><li>[[shang-dynasty]] — 商朝的天帝信仰</li><li>[[spring-autumn-period]] — 天命观的松动（礼崩乐坏）</li><li>[[zhou-feudal-system]] — 周代封建制（天命观的政治实践）</li></ul>";
  C["feudal-system"]="<h1>周代封建制</h1>\n<h2>核心定义</h2>\n<p>周代封建制是周朝建立的一套<em>*分封治理体系</em>*：天子将土地和人民分封给同姓宗亲和功臣，建立诸侯国；诸侯国内又层层分封。它与宗法制结合，形成\"家国同构\"的政治架构。</p>\n<h2>与欧洲 Feudalism 的异同</h2>\n<table><tr><th>维度</th><th>周代封建制</th><th>欧洲 Feudalism</th></tr><tr><td>纽带</td><td>**血缘** + 契约</td><td>**契约**为主</td></tr><tr><td>继承</td><td>嫡长子继承（宗法制）</td><td>长子继承（各地不同）</td></tr><tr><td>层级</td><td>天子→诸侯→卿大夫→士</td><td>国王→公爵→伯爵→骑士</td></tr><tr><td>经济基础</td><td>井田制（土地公有框架）</td><td>庄园制（领主私有）</td></tr><tr><td>瓦解原因</td><td>郡县制替代（内因）</td><td>商品经济 + 王权强化</td></tr></table>\n<h2>分封体系</h2>\n<h3>诸侯类型</h3>\n<ul><li>**同姓诸侯**：姬姓子弟（如鲁、晋、燕、卫）</li><li>**功臣诸侯**：如太公望（姜尚）封于齐</li><li>**前朝后裔**：如宋（商朝后裔）、陈（舜后裔）</li></ul>\n<h3>诸侯义务</h3>\n<ol><li>**朝贡**：定期朝见天子，进贡方物</li><li>**从征**：天子征伐时提供军队</li><li>**筑城**：参与王都建设</li><li>**述职**：定期汇报治下情况</li></ol>\n<h3>天子权力</h3>\n<ul><li>分封权：册命诸侯，授予土地人民</li><li>废立权：对不守规矩的诸侯可讨伐、废黜</li><li>巡狩权：定期巡察各诸侯国</li></ul>\n<h2>宗法制与封建制的结合</h2>\n<p>宗法制解决\"谁继承\"的问题（嫡长子），封建制解决\"分什么\"的问题（土地、人民、权力）。二者结合形成：</p>\n<pre><code>天子（大宗）──诸侯（小宗/大宗）──卿大夫（小宗/大宗）──士\n  │              │                    │\n  王畿           封国                 采邑</code></pre>\n<p>\"大宗百世不迁，小宗五世则迁\"——大宗永远保持宗主地位，小宗五代后可自立门户。</p>\n<h2>瓦解过程</h2>\n<h3>春秋：封建制的松动</h3>\n<ul><li>诸侯不朝天子，\"礼乐征伐自诸侯出\"</li><li>诸侯国内卿大夫专权（如鲁国三桓、晋国六卿）</li><li>县制的出现削弱了封建层级</li><li>楚、秦等国直接设县，由国君委派长官</li></ul>\n<h3>战国：封建制的崩溃</h3>\n<ul><li>各国变法废除世卿世禄</li><li>商鞅变法：\"宗室非有军功论，不得为属籍\"</li><li>郡县制全面推广</li><li>官僚制取代贵族制</li></ul>\n<h2>历史遗产</h2>\n<ul><li>分封制在汉初一度复活（郡国并行），引发七国之乱</li><li>此后历代虽有封王，但**实封不治民**，封建制在政体上已终结</li><li>\"封建\"一词成为传统社会的代名词（\"封建社会\"）</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[zhou-dynasty]] — 周朝</li><li>[[mandate-of-heaven]] — 天命观（封建制的理论基础）</li><li>[[spring-autumn-period]] — 封建制松动的时代</li><li>[[warring-states-period]] — 封建制崩溃</li><li>[[well-field-system]] — 井田制</li></ul>";
  C["bronze-age"]="<h1>中国青铜文明</h1>\n<h2>概述</h2>\n<p>中国青铜时代约从公元前 2000 年延续至公元前 500 年（春秋晚期），以夏商周三代为中心。与近东地区青铜主要用于工具和武器不同，中国青铜文明的<em>*核心功能是礼仪和祭祀</em>*，形成了独特的\"礼器文化\"。</p>\n<h2>发展阶段</h2>\n<table><tr><th>阶段</th><th>时期</th><th>代表文化/遗址</th><th>特征</th></tr><tr><td>萌芽</td><td>~2000 BCE</td><td>二里头文化</td><td>爵、斝等早期青铜礼器</td></tr><tr><td>鼎盛</td><td>商晚期</td><td>殷墟（安阳）</td><td>司母戊鼎，铭文，复杂铸造技术</td></tr><tr><td>转型</td><td>西周</td><td>周原、丰镐</td><td>长篇铭文（毛公鼎 499 字），礼制规范化</td></tr><tr><td>衰落</td><td>春秋晚期</td><td>—</td><td>铁器时代到来，礼器文化让位于实用兵器</td></tr></table>\n<h2>技术成就</h2>\n<h3>铸造技术</h3>\n<ul><li>**范铸法**（块范法）：中国青铜铸造的主流技术</li><li>先制模（model），翻范（mold section），合范浇铸</li><li>可铸造极复杂的花纹和造型</li><li>**分铸法**：分别铸造不同部件，再连接</li><li>**失蜡法**：战国时期出现，用于精细镂空纹饰</li></ul>\n<h3>合金配比</h3>\n<p>《考工记》记载的\"六齐\"配方：</p>\n<blockquote>\"金有六齐：六分其金而锡居一，谓之钟鼎之齐\"</blockquote>\n<table><tr><th>器物</th><th>铜:锡</th><th>用途</th></tr><tr><td>钟鼎</td><td>5:1 ~ 6:1</td><td>礼乐器</td></tr><tr><td>斧斤</td><td>4:1 ~ 5:1</td><td>工具</td></tr><tr><td>戈戟</td><td>3:1 ~ 4:1</td><td>兵器</td></tr><tr><td>大刃</td><td>2:1 ~ 3:1</td><td>刀剑</td></tr><tr><td>削杀矢</td><td>3:2 ~ 5:2</td><td>箭镞</td></tr></table>\n<h2>代表性器物</h2>\n<table><tr><th>器物</th><th>时期</th><th>特征</th></tr><tr><td>**司母戊鼎**（后母戊鼎）</td><td>商晚期</td><td>世界最大青铜器，832.84kg</td></tr><tr><td>**毛公鼎**</td><td>西周</td><td>铭文最长的青铜器（499字）</td></tr><tr><td>**曾侯乙编钟**</td><td>战国早期</td><td>65件编钟，音域跨五个半八度</td></tr><tr><td>**三星堆青铜人像**</td><td>商代同期</td><td>不同于中原的独特风格</td></tr></table>\n<h2>与世界的比较</h2>\n<table><tr><th>维度</th><th>中国</th><th>近东/欧洲</th></tr><tr><td>主要用途</td><td>**礼器**（祭祀、权力象征）</td><td>工具、武器、装饰品</td></tr><tr><td>铸造技术</td><td>范铸法为主</td><td>失蜡法为主</td></tr><tr><td>合金</td><td>铜锡铅三元合金</td><td>铜锡为主</td></tr><tr><td>铭文</td><td>长篇金文（记录历史/册命）</td><td>极少长篇铭文</td></tr><tr><td>规模化</td><td>早期即大规模生产</td><td>逐步发展</td></tr></table>\n<blockquote>中国青铜时代的一个独特现象：将最先进的技术（青铜铸造）投入到非生产性的礼仪领域，而非直接用于军事和农业。</blockquote>\n<h2>文明意义</h2>\n<p>青铜礼器是中国早期国家的<em>*权力象征和信仰载体</em>*：</p>\n<ul><li>九鼎传说——象征王权和国家统一</li><li>\"国之大事，在祀与戎\"——祭祀用的青铜礼器是国家第一等重要器物</li><li>青铜铭文是最早的信史材料之一</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[shang-dynasty]] — 青铜文明的巅峰</li><li>[[zhou-dynasty]] — 从礼器到铭文的转变</li><li>[[spring-autumn-period]] — 青铜时代向铁器时代的过渡</li><li>[[sanxingdui]] — 独立于中原的青铜文明</li><li>[[erlitou-culture]] — 青铜文明的起点</li></ul>";
  C["hundred-schools"]="<h1>诸子百家</h1>\n<h2>概述</h2>\n<p>诸子百家是先秦时期各学术思想流派的总称，代表了中国历史上<em>*第一次大规模思想解放运动</em>*。春秋后期萌芽，战国中期形成\"百家争鸣\"的繁荣局面。各家提出不同的治国方案和人生哲学，奠定了此后两千多年中国文化的基本格局。</p>\n<h2>背景</h2>\n<h3>为何在春秋战国出现？</h3>\n<ol><li>**礼崩乐坏**：周王室衰落，传统的礼乐秩序瓦解，需要新的思想体系</li><li>**社会流动**：士阶层崛起，\"学在官府\"变为\"学在民间\"</li><li>**竞争需求**：诸侯争霸，急需人才和治国方略</li><li>**著作工具**：竹简和文字的普及使得大规模著作成为可能</li></ol>\n<h2>九流十家</h2>\n<p>班固《汉书·艺文志》的分类（\"可观者九家\"，加小说家为\"十家\"）：</p>\n<h3>核心四家</h3>\n<table><tr><th>学派</th><th>创始人/代表</th><th>核心主张</th><th>代表著作</th></tr><tr><td>**儒家**</td><td>[[confucius\\</td><td>孔子]]、孟子、荀子</td><td>仁、礼、德治、教化</td><td>《论语》《孟子》《荀子》</td></tr><tr><td>**道家**</td><td>[[laozi\\</td><td>老子]]、庄子</td><td>道法自然、无为而治</td><td>《老子》《庄子》</td></tr><tr><td>**墨家**</td><td>墨子</td><td>兼爱、非攻、尚贤、节用</td><td>《墨子》</td></tr><tr><td>**法家**</td><td>[[han-fei\\</td><td>韩非]]、商鞅</td><td>法治、耕战、君主集权</td><td>《韩非子》《商君书》</td></tr></table>\n<h3>其他重要学派</h3>\n<table><tr><th>学派</th><th>代表</th><th>关注领域</th></tr><tr><td>**名家**</td><td>公孙龙、惠施</td><td>逻辑学、名实关系（\"白马非马\"）</td></tr><tr><td>**阴阳家**</td><td>邹衍</td><td>阴阳五行、五德终始（历史循环论）</td></tr><tr><td>**纵横家**</td><td>苏秦、张仪</td><td>外交策略、合纵连横</td></tr><tr><td>**兵家**</td><td>[[sun-tzu\\</td><td>孙武]]、孙膑</td><td>军事战略</td></tr><tr><td>**农家**</td><td>许行</td><td>重农思想</td></tr><tr><td>**杂家**</td><td>吕不韦</td><td>综合各家（《吕氏春秋》）</td></tr></table>\n<h2>四家核心思想对比</h2>\n<table><tr><th>维度</th><th>儒家</th><th>道家</th><th>墨家</th><th>法家</th></tr><tr><td>人性论</td><td>性善/性恶（有分歧）</td><td>自然朴素</td><td>—</td><td>性恶</td></tr><tr><td>治国方略</td><td>德治+礼治</td><td>无为而治</td><td>尚贤+兼爱</td><td>法治+术+势</td></tr><tr><td>社会理想</td><td>大同、小康</td><td>小国寡民</td><td>兼相爱交相利</td><td>富国强兵</td></tr><tr><td>对传统态度</td><td>复古（法先王）</td><td>返朴归真</td><td>法天</td><td>法后王、变法</td></tr><tr><td>后世命运</td><td>成为正统</td><td>与儒家互补</td><td>秦后衰落</td><td>外儒内法</td></tr></table>\n<h2>相互影响与争鸣</h2>\n<pre><code>儒家批判墨家\"兼爱是无父也\"（孟子）\n道家庄子嘲讽儒家（\"儒以诗礼发冢\"）\n法家韩非批判儒墨（\"儒以文乱法，侠以武犯禁\"）\n墨家批判儒家厚葬、礼乐浪费</code></pre>\n<p>但各家也有相互吸收：</p>\n<ul><li>荀子（儒家）吸收了法家思想（隆礼重法）</li><li>韩非（法家）师从荀子</li><li>《吕氏春秋》（杂家）综合各家</li><li>汉初黄老之学融合道法</li></ul>\n<h2>历史影响</h2>\n<ol><li>**儒家成为正统**：汉武帝\"罢黜百家，独尊儒术\"后，儒学成为官方意识形态</li><li>**道法融合**：\"外儒内法\"成为历代王朝的实际治理模式</li><li>**文化基因**：诸子思想成为中国文化的核心基因，渗透到文学、艺术、政治、日常生活</li><li>**学术范式**：奠定了中国学术分类和论述方式</li></ol>\n<blockquote>吕思勉《经子解题》：\"诸子之文，各有其面貌性情，彼此不能相假……'个性'最显著者。\"</blockquote>\n<h2>相关条目</h2>\n<ul><li>[[confucius]] — 孔子</li><li>[[laozi]] — 老子</li><li>[[sun-tzu]] — 孙子</li><li>[[han-fei]] — 韩非子</li><li>[[confucianism]] — 儒家思想</li><li>[[legalism-philosophy]] — 法家思想</li><li>[[spring-autumn-period]] — 春秋（萌芽期）</li><li>[[warring-states-period]] — 战国（鼎盛期）</li><li>[[burning-books-burying-scholars]] — 焚书坑儒（诸子时代的终结）</li></ul>";
  C["commandery-county"]="<h1>郡县制</h1>\n<h2>核心定义</h2>\n<p>郡县制是一种<em>*中央直辖</em>*的地方行政制度，由君主直接任命地方长官（郡守、县令），与周代[[zhou-feudal-system|封建制]]的层层分封形成根本对立。秦始皇统一后将其推广至全国，奠定了此后两千年中国地方行政的基本框架。</p>\n<h2>封建制 vs 郡县制</h2>\n<table><tr><th>维度</th><th>封建制</th><th>郡县制</th></tr><tr><td>权力来源</td><td>世袭（封地传给子孙）</td><td>任命（君主委派）</td></tr><tr><td>官员性质</td><td>领主（世袭管理）</td><td>官僚（任期制、可调动）</td></tr><tr><td>对中央关系</td><td>松散（诸侯有独立权）</td><td>严密（直接受中央管控）</td></tr><tr><td>经济基础</td><td>井田制（土地公有框架）</td><td>土地私有制</td></tr><tr><td>典型时代</td><td>西周</td><td>秦及以后</td></tr></table>\n<h2>发展历程</h2>\n<h3>春秋萌芽</h3>\n<ul><li>**楚国最早设县**：灭国后不封给功臣，而是设立由国君直辖的\"县\"</li><li>**晋国**在新征服地区设县，由国君派大夫管理</li><li>此时县的规模较小，且县大夫往往仍为世袭</li></ul>\n<h3>战国推广</h3>\n<ul><li>各国变法中普遍推广郡县制</li><li>[[shang-yang|商鞅变法]]在秦设 **31 县**，任命县令，彻底废除贵族世袭特权</li><li>县下设乡、里，建立严密的基层管理体系</li></ul>\n<h3>秦朝确立</h3>\n<ul><li>秦始皇统一后推行全国，初设 **36 郡**，后增至 40 余郡</li><li>郡设**郡守**（行政）、**郡尉**（军事）、**监御史**（监察）</li><li>县设**县令**（或县长）</li><li>\"海内为郡县，法令由一统\"——中国历史上第一次真正意义上的中央集权</li></ul>\n<h2>历史意义</h2>\n<ol><li>**官僚制取代贵族制**：官员由任命而非世袭，可升可降可免</li><li>**国家能力的飞跃**：中央能有效地调动全国资源</li><li>**社会流动**：平民可通过军功或才能进入官僚体系</li><li>\"百代皆行秦政法\"——此后两千年，郡县制始终是中国地方行政的基础</li></ol>\n<h2>局限性</h2>\n<ul><li>过度集权可能导致地方缺乏自主性和活力</li><li>官僚体系僵化——\"官僚主义\"的源头</li><li>与封建制的张力始终存在：汉初郡国并行、西晋分封、明朝藩王——\"郡县vs封建\"成为中国政治史的永恒主题</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[zhou-feudal-system]] — 周代封建制（对立面）</li><li>[[shang-yang]] — 商鞅变法（郡县制在秦的实现）</li><li>[[qin-shi-huang]] — 秦始皇（全国推广）</li><li>[[state-qin]] — 秦国</li></ul>";
  C["vertical-horizontal"]="<h1>合纵连横</h1>\n<h2>核心定义</h2>\n<p><em>*合纵连横</em>*是战国中后期两大对立的外交战略：</p>\n<ul><li>**合纵**（Vertical Alliance）：弱国联合对抗强国——\"合众弱以攻一强\"。六国南北纵向联盟抗秦（苏秦为代表）</li><li>**连横**（Horizontal Alliance）：强国拉拢弱国——\"事一强以攻众弱\"。秦国横向拉拢各国，各个击破（张仪为代表）</li></ul>\n<h2>代表人物</h2>\n<table><tr><th>战略</th><th>代表人物</th><th>国籍</th><th>服务对象</th></tr><tr><td>合纵</td><td>**苏秦**</td><td>东周洛阳</td><td>六国联盟（佩六国相印）</td></tr><tr><td>连横</td><td>**张仪**</td><td>魏国</td><td>[[state-qin</td><td>秦国]]（秦相）</td></tr></table>\n<blockquote>苏秦、张仪均师出**鬼谷子**门下，同门兄弟各为其主，演绎了战国最精彩的外交博弈。</blockquote>\n<h2>苏秦合纵</h2>\n<h3>首次合纵（前 334 BCE）</h3>\n<ul><li>苏秦游说六国，倡导\"**合纵弱以攻一强**\"</li><li>成功说服燕、赵、韩、魏、齐、楚六国结盟</li><li>**佩六国相印**——中国历史上独一无二的成就</li><li>秦国十五年不敢出函谷关</li></ul>\n<h3>合纵的瓦解</h3>\n<ul><li>六国各怀私心，联盟脆弱</li><li>张仪连横策略从内部瓦解合纵</li><li>齐魏伐赵、燕齐相攻——盟友反目</li><li>苏秦最终被齐大夫刺杀</li></ul>\n<h2>张仪连横</h2>\n<h3>经典操作：拆散齐楚联盟</h3>\n<ul><li>张仪以割地六百里为诱饵，骗楚国与齐国**绝交**</li><li>楚国照做后，张仪改口说\"六里\"</li><li>楚怀王大怒攻秦，大败</li><li>楚国从此元气大伤</li></ul>\n<h3>连横精髓</h3>\n<blockquote>\"远交近攻\"——范雎在张仪基础上的发展</blockquote>\n<p>连横的核心：</p>\n<ol><li>**分化瓦解**：在合纵国家间制造矛盾</li><li>**胡萝卜+大棒**：威逼利诱，使其一一倒向秦</li><li>**时间差**：每次只对付一个对手</li></ol>\n<h2>战略对比</h2>\n<table><tr><th>维度</th><th>合纵</th><th>连横</th></tr><tr><td>力量来源</td><td>多国联盟</td><td>单一强国</td></tr><tr><td>弱点</td><td>联盟脆弱、利益不一</td><td>需持续威慑和利诱</td></tr><tr><td>成功条件</td><td>各国同心</td><td>分化瓦解成功</td></tr><tr><td>最终结果</td><td>多次失败</td><td>**成功**——秦统一</td></tr></table>\n<h2>成败原因</h2>\n<h3>合纵为何总是失败？</h3>\n<ol><li>**各怀私心**：六国互相猜忌，不能真正同心</li><li>**地缘矛盾**：韩魏赵接壤秦国压力最大，齐楚燕远离秦国不急</li><li>**利益诱惑**：秦国以割地、联姻等方式不断瓦解联盟</li><li>**制度劣势**：合纵是临时军事同盟，秦国是统一的国家机器</li></ol>\n<h3>连横为何成功？</h3>\n<ol><li>**制度优势**：秦国变法彻底，国力碾压单一六国</li><li>**战略连贯**：张仪、范雎、李斯等连续推行连横</li><li>**各个击破**：每次只打击一个对象，避免全面冲突</li></ol>\n<h2>相关条目</h2>\n<ul><li>[[warring-states-period]] — 战国时代</li><li>[[state-qin]] — 秦国</li><li>[[guiguzi]] — 鬼谷子</li><li>[[su-qin]] · [[zhang-yi]]</li></ul>";
  C["well-field"]="<h1>井田制</h1>\n<h2>核心定义</h2>\n<p>井田制是西周至春秋时期的土地制度，得名于将一块土地按\"<em>*井</em><em>\"字形划分为九块。中间为\"公田\"（产出归领主），周围八块为\"私田\"（产出归农户）。理想化的井田制反映了</em><em>土地公有</em>*的理念。</p>\n<h2>基本结构</h2>\n<pre><code>   私田  私田  私田\n   私田 [公田] 私田\n   私田  私田  私田</code></pre>\n<ul><li>**公田**（中心）：八户共同耕种，产出归领主/国家</li><li>**私田**（四周）：八户各自耕种，产出归自己</li><li>一井 = 900 亩（约合今 182 亩）</li><li>八家为一井，构成基层生产单位</li></ul>\n<h2>真实性争议</h2>\n<ul><li>**孟子**最早系统描述井田制（\"方里而井，井九百亩\"）</li><li>但孟子自己也承认\"其详不可得闻也\"</li><li>现代学者多认为：</li><li>可能有土地**定期分配**的实践</li><li>但\"井\"字形九宫格划分是理想化的构想</li><li>井田制可能是儒家对\"理想社会\"的一种**托古改制**</li></ul>\n<h2>与[[zhou-feudal-system|封建制]]的关系</h2>\n<ul><li>封建制是政治制度（分封），井田制是经济基础（土地分配）</li><li>封建等级与土地分配对应：天子→诸侯→卿大夫，每级都控制一定范围的土地</li><li>\"普天之下，莫非王土\"——名义上所有土地归天子所有</li></ul>\n<h2>瓦解原因</h2>\n<p>春秋战国时期，井田制逐渐瓦解：</p>\n<ol><li>**铁器和牛耕**的普及 → 生产力提高 → 个体农户能耕种更多土地 → 集体耕作不必要</li><li>**人口增长** → 人均土地减少 → 井田分配无法维持</li><li>**土地私有化** → 贵族和富农购买土地 → 打破公田私田的界限</li><li>**战争需求** → 各国需要更多税收 → 按实际土地面积征税 → 废除井田制</li></ol>\n<h3>历史节点</h3>\n<ul><li>前 594 年，鲁国\"**初税亩**\"——按土地面积征税，正式承认土地私有（井田制瓦解的标志）</li><li>前 350 年，商鞅\"**废井田，开阡陌**\"——从法律上彻底废除井田制</li></ul>\n<h2>后世影响</h2>\n<ul><li>井田制成为后世**土地改革的理想模板**</li><li>王莽\"王田制\"、均田制、太平天国\"天朝田亩制度\"都受其启发</li><li>作为儒家理想社会的象征，影响了中国两千年的土地思想</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[zhou-feudal-system]] — 周代封建制</li><li>[[shang-yang]] — 商鞅（废井田）</li><li>[[spring-autumn-period]] — 井田制瓦解的时代</li></ul>";
  C["goguryeo"]="<h1>高句丽 (Goguryeo)</h1>\n<h2>概述</h2>\n<p>高句丽是<em>*朝鲜半岛三国时代</em><em>中最强大的王国（与百济、新罗并立），横跨今日中国东北和朝鲜半岛北部。以其顽强的军事韧性闻名——它</em><em>拖垮了隋朝</em><em>，并在唐太宗的亲征中存活，是东亚历史上最难被征服的政权之一。从公元前 37 年建国到公元 668 年被唐与新罗联军灭亡，历时 </em><em>705 年</em>*。</p>\n<h2>建国传说</h2>\n<p>公元前 37 年，<em>*朱蒙</em><em>（东明圣王）从扶余国（今吉林）南下，在</em><em>纥升骨城</em>*（今辽宁桓仁）建立高句丽。</p>\n<blockquote>传朱蒙母柳花为河伯之女，被日光照射怀孕，生大卵——朱蒙破卵而出。卵生神话是东北亚民族的共同母题。</blockquote>\n<h2>疆域变迁</h2>\n<table><tr><th>时期</th><th>都城</th><th>范围</th></tr><tr><td>早期（前 37–3 CE）</td><td>纥升骨城（辽宁桓仁）</td><td>鸭绿江流域</td></tr><tr><td>中期（3–427 CE）</td><td>国内城 + 丸都山城（吉林集安）</td><td>扩张至辽东</td></tr><tr><td>鼎盛（427–668 CE）</td><td>**平壤**</td><td>辽河至汉江</td></tr></table>\n<p><em>*好太王</em>*（广开土王，391–412 年在位）时期疆域达到巅峰：西至辽河，北至松花江，南抵汉江。</p>\n<h2>都城体系</h2>\n<p>高句丽独创<em>*平原城 + 山城</em>*双城防御体系：</p>\n<ul><li>**平原城**：日常行政、居住（如国内城）</li><li>**山城**：战时退守（如丸都山城，易守难攻）</li><li>战时全民退入山城，敌人攻城代价极高</li></ul>\n<p>这套体系使得高句丽在面对中原大军时始终无法被彻底消灭。</p>\n<h2>与中原王朝的千年对抗</h2>\n<table><tr><th>对手</th><th>时期</th><th>结果</th></tr><tr><td>曹魏</td><td>244 CE</td><td>丸都山城被毌丘俭攻破，但高句丽复国</td></tr><tr><td>前燕（慕容氏）</td><td>4 世纪</td><td>多次交锋</td></tr><tr><td>**隋朝**</td><td>598–614 CE</td><td>**隋炀帝三征惨败，隋朝因此灭亡**</td></tr><tr><td>**唐朝**</td><td>645–668 CE</td><td>唐太宗亲征未克；唐高宗联合新罗最终平定</td></tr></table>\n<h3>隋炀帝三征（612–614 CE）</h3>\n<p>这是中国历史上最惨烈的远征之一：</p>\n<ul><li>**612 年第一次**：调动号称 113 万兵卒，24 路大军。隋军在**萨水**（今清川江）大败——\"九军将士，一日一夜还至鸭绿水者，二千七百人\"</li><li>613 年、614 年两次再征，均失败</li><li>三次远征耗尽国力，民变四起，**隋朝因此灭亡**</li></ul>\n<blockquote>高句丽是历史上唯一一个直接导致大一统王朝覆灭的东北亚政权。</blockquote>\n<h3>唐太宗亲征（645 CE）</h3>\n<ul><li>唐太宗李世民亲率大军东征</li><li>攻下**辽东城**（今辽阳），但在**安市城**（今辽宁海城）受阻</li><li>高句丽守将杨万春坚守不退，唐军粮尽而退</li><li>这是唐太宗一生中**少有的未竟全功**的军事行动</li></ul>\n<h2>文化成就</h2>\n<h3>壁画墓</h3>\n<ul><li>高句丽古墓壁画精美绝伦，描绘战争、狩猎、宴饮、天象、神兽</li><li>**吉林集安**和**朝鲜平壤附近**的壁画墓群被列为**世界文化遗产**</li><li>色彩艳丽，动感强烈，是东亚艺术史上的杰作</li></ul>\n<h3>好太王碑</h3>\n<ul><li>立于**414 年**，高 6.39 米，刻 1775 字</li><li>现存**吉林集安**，是中国最大的石碑之一</li><li>记述好太王的功绩：征百济、救新罗、驱逐倭寇</li><li>是研究高句丽和东亚古代史的第一手史料</li></ul>\n<h3>山城建筑</h3>\n<ul><li>高句丽的石筑山城代表东亚军事工程的最高水平</li><li>城墙依山势蜿蜒，雄壮险峻</li><li>对后世朝鲜半岛和日本的山城建筑影响深远</li></ul>\n<h2>灭亡</h2>\n<p>668 年，<em>*唐朝与新罗联军</em>*南北夹击：</p>\n<ul><li>唐将**李勣**（徐世勣）率军围攻平壤</li><li>高句丽内部分裂（权臣渊盖苏文死后诸子争权）</li><li>平壤城破，末代王**宝藏王**被俘</li><li>**705 年的高句丽灭亡**</li></ul>\n<p>唐朝在平壤设<em>*安东都护府</em>*，但随后与新罗爆发战争，最终退出半岛。新罗统一了半岛中南部，高句丽的北部领土则被唐朝和后来的渤海国继承。</p>\n<h2>后世争议：高句丽属于谁</h2>\n<p>这是一个极其敏感的现代学术和政治问题：</p>\n<table><tr><th>观点</th><th>依据</th></tr><tr><td>🇨🇳 中国</td><td>核心领土大都在今中国境内（吉林、辽宁），是\"中国东北地方政权\"</td></tr><tr><td>🇰🇷 韩国</td><td>是\"朝鲜半岛三国之一\"，高句丽历史是韩国历史的源头之一</td></tr></table>\n<p>实际上，它<em>*两者都是</em>*——疆域横跨现代中朝两国，文化同时影响了两个现代民族。高句丽的遗产不属于单一国家。</p>\n<h2>历史意义</h2>\n<ul><li>证明了**小国可以通过防御体系和全民动员**对抗超级大国</li><li>隋朝的灭亡直接与高句丽相关——改变了中国历史的走向</li><li>唐朝花费 23 年（645–668）才最终平定，可见其韧性</li><li>高句丽灭亡后，其遗民参与建立了**渤海国**（698–926），延续了东北亚的独立王国传统</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[sui-dynasty]] — 隋朝</li><li>[[tang-dynasty]] — 唐朝</li><li>[[baekje]] — 百济</li><li>[[silla]] — 新罗</li><li>[[balhae]] — 渤海国</li><li>[[pre-qin-timeline]] — 先秦时间线（作为对比：先秦终时高句丽还要 200 多年才建国）</li></ul>";
  C["yongle"]="<h1>永乐大典</h1>\n<h2>概述</h2>\n<p>《永乐大典》是明成祖永乐年间编纂的<em>*全世界最大的纸质百科全书</em><em>，全书 22,877 卷、11,095 册、约 3.7 亿字。它不仅是明初的文化巅峰，也是中国文献史上最重要的大型类书。可惜历经劫难，</em><em>现存不足原书的 4%</em>*。</p>\n<h2>编纂</h2>\n<h3>背景</h3>\n<ul><li>永乐元年（1403 年），明成祖朱棣命解缙主持编纂</li><li>初名《文献大成》，一年后成书，朱棣不满意——\"尚多未备\"</li><li>永乐三年（1405 年）重启，以姚广孝、解缙、郑赐为监修</li><li>动**用 2,169 人**，包括学者、抄写员、校对</li><li>**永乐六年（1408 年）**正式完成，赐名《永乐大典》</li></ul>\n<h3>编排方式</h3>\n<ul><li>按《洪武正韵》的**韵目**编排</li><li>\"用韵以统字，用字以系事\"——按韵查字，按字找条目</li><li>每个条目下**原文照录**整部书或整段文字，不做删节</li><li>收录先秦至明初的约 **7,000–8,000 种**典籍</li></ul>\n<blockquote>这种\"原文照录\"的方式使它成为一座**辑佚宝库**——许多后世失传的古籍全靠《大典》残卷才为人所知。</blockquote>\n<h2>规模</h2>\n<table><tr><th>指标</th><th>数据</th></tr><tr><td>总卷数</td><td>22,877 卷</td></tr><tr><td>总册数</td><td>11,095 册</td></tr><tr><td>总字数</td><td>约 3.7 亿字</td></tr><tr><td>参与人数</td><td>2,169 人</td></tr><tr><td>编纂时间</td><td>5 年（1403–1408）</td></tr><tr><td>收录古籍</td><td>约 7,000–8,000 种</td></tr></table>\n<blockquote>作为对比：《大英百科全书》（第 15 版）约 4,400 万字——《永乐大典》是其 **8 倍以上**。</blockquote>\n<h2>正本与副本</h2>\n<h3>正本</h3>\n<ul><li>永乐年间完成的原稿，仅此一部</li><li>藏于南京文渊阁，后随迁都北移至北京</li></ul>\n<h3>副本（嘉靖副本）</h3>\n<ul><li>嘉靖三十六年（1557 年），宫中大火，正本险些焚毁</li><li>嘉靖帝下令**重录副本**</li><li>历时六年（1562–1567），由 108 名抄写员完成</li><li>副本的**版式、装帧与正本完全相同**</li></ul>\n<h3>正本消失之谜</h3>\n<p>嘉靖副本完成后，<em>*正本从此消失</em>*。三大假说：</p>\n<table><tr><th>假说</th><th>依据</th></tr><tr><td>🔥 **毁于明末战火**</td><td>李自成撤离北京时烧毁皇宫</td></tr><tr><td>⚰️ **殉葬永陵**</td><td>嘉靖皇帝喜爱此书，可能随葬入永陵地宫（考古未证实）</td></tr><tr><td>🔥 **毁于宫中火灾**</td><td>万历或更早的宫中大火</td></tr></table>\n<p>正本的失踪是中国文献史上<em>*最大的谜案之一</em>*。</p>\n<h2>散佚经过</h2>\n<table><tr><th>时间</th><th>事件</th><th>损失</th></tr><tr><td>嘉靖年间</td><td>宫中大火，正本险些被毁</td><td>促使重录副本</td></tr><tr><td>明末清初</td><td>战乱</td><td>副本开始散佚</td></tr><tr><td>乾隆修《四库》</td><td>清点发现已缺 1,000 余册</td><td>约 10% 已失</td></tr><tr><td>晚清</td><td>**官员监守自盗**，翰林院藏书被大量偷走</td><td>加速流失</td></tr><tr><td>**1900 年**</td><td>**义和团运动 + 八国联军**</td><td>🔥 **毁灭性打击**</td></tr></table>\n<h3>翰林院大火（1900 年）</h3>\n<p>1900 年义和团围攻外国使馆区，位于使馆区旁的<em>*翰林院</em>*（藏有《永乐大典》）被战火波及。大火之后：</p>\n<ul><li>残卷被**外国使馆人员、传教士、书商**捡走</li><li>英国使馆人员将其运至伦敦拍卖</li><li>大量卷册流散至欧、美、日各国</li></ul>\n<blockquote>这是《永乐大典》历史上最惨烈的损失——本已残缺的副本经此一劫，十不存一。</blockquote>\n<h2>现存情况</h2>\n<p><em>*仅存约 400 余册、800 余卷——不到原书的 4%。</em>*</p>\n<table><tr><th>收藏地</th><th>册数</th><th>来源</th></tr><tr><td>🇨🇳 中国国家图书馆（北京）</td><td>**224 册**</td><td>最大藏家</td></tr><tr><td>🇨🇳 台北故宫博物院</td><td>62 册</td></tr><tr><td>🇯🇵 日本（东洋文库等）</td><td>~60 册</td><td>1900 年后流入</td></tr><tr><td>🇬🇧 英国（大英图书馆等）</td><td>~50 册</td><td>1900 年掠走</td></tr><tr><td>🇺🇸 美国（国会图书馆等）</td><td>~40 册</td><td>购买/捐赠</td></tr><tr><td>🇩🇪 德国、🇰🇷 韩国等</td><td>零星数册</td></tr></table>\n<h2>当代努力</h2>\n<ul><li>**影印出版**：现存残卷已全部影印出版，可供研究</li><li>**辑佚**：清代以来学者从残卷中辑出大量失传古籍——《旧五代史》《宋会要》《元和姓纂》等均靠《大典》得以复原</li><li>**全球征集**：中国国家图书馆持续从海外购回散失卷册</li><li>**数字化**：完成现存卷的数字化</li></ul>\n<h2>文化意义</h2>\n<ul><li>中国**类书编纂传统的巅峰**（此前有《艺文类聚》《太平御览》，此后有《古今图书集成》《四库全书》）</li><li>**辑佚学**的基础文献——大量宋元古籍靠它保存</li><li>体现明初\"**盛世修典**\"的文化雄心</li><li>永乐帝迁都北京、派郑和下西洋、修《永乐大典》——三件大事构成明初的文化格局</li></ul>\n<h2>相关条目</h2>\n<ul><li>[[ming-dynasty]] — 明朝</li><li>[[yongle-emperor]] — 明成祖朱棣</li><li>[[siku-quanshu]] — 《四库全书》</li><li>[[hanlin-academy]] — 翰林院</li><li>[[boxer-rebellion]] — 义和团运动</li></ul>";

  .on("mouseover",function(e,d){d3.select(this).transition().duration(200).attr("r",(radii[d.g]||8)*1.5);link.attr("opacity",function(l){return(l.source.id===d.id||l.target.id===d.id)?1:0.02});node.select("circle").attr("opacity",function(n){if(n.id===d.id)return 1;for(var j=0;j<data.links.length;j++)if((data.links[j].source.id===d.id&&data.links[j].target.id===n.id)||(data.links[j].target.id===d.id&&data.links[j].source.id===n.id))return 0.6;return 0.03;});tooltip.style("display","block").html("<b>"+d.t+"</b><br><span style='color:#8b949e'>"+(d.d||"")+"</span>");})
  .on("mousemove",function(e){tooltip.style("left",(e.pageX+12)+"px").style("top",(e.pageY-40)+"px")})
  .on("mouseout",function(){d3.select(this).transition().duration(200).attr("r",function(d){return radii[d.g]||8});link.attr("opacity",function(d){return d.type=="r"?0.3:d.type=="l2"?0.7:d.type=="j"?0.5:0.5});node.select("circle").attr("opacity",function(d){return d.g=="dim"?0.15:1});tooltip.style("display","none");});

node.append("text").text(function(d){return d.t}).attr("dy",function(d){return(radii[d.g]||8)+12}).attr("text-anchor","middle").attr("fill","#c9d1d9").attr("font-size",function(d){return d.g=="state"||d.g=="thinker"||d.g=="reformer"||d.g=="military"||d.g=="battle"?"9":"11"}).attr("font-weight",function(d){return d.g=="lord"||d.g=="emperor"?"bold":"normal"});

d3.select("svg").on("click",function(){document.getElementById("panel").classList.remove("show");});
function closePanel(){document.getElementById("panel").classList.remove("show");}

sim.on("tick",function(){link.attr("x1",function(d){return d.source.x}).attr("y1",function(d){return d.source.y}).attr("x2",function(d){return d.target.x}).attr("y2",function(d){return d.target.y});node.attr("transform",function(d){return"translate("+d.x+","+d.y+")"});});
</script>
