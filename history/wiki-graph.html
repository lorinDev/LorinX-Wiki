C["xia-dynasty"]="<h1>夏朝</h1><p>中国第一个世袭王朝,约2070–1600 BCE。</p><table><tr><th>人物</th><th>事迹</th></tr><tr><td>大禹</td><td>治水·九州</td></tr><tr><td>启</td><td>世袭制开始</td></tr><tr><td>桀</td><td>暴君·被商灭</td></tr></table>";
C["shang-dynasty"]="<h1>商朝</h1><p>第一个文字证实的王朝(~1600–1046 BCE)。</p><ol><li><b>甲骨文</b>—最早汉字(~1250 BCE)</li><li><b>青铜器</b>—司母戊鼎832kg</li><li><b>祖先崇拜</b>—人殉制度</li></ol>";
C["zhou-dynasty"]="<h1>周朝</h1><p>最长王朝(1046–256 BCE,790年)。</p><h3>天命观</h3><blockquote>天命靡常,以德配天</blockquote><h3>封建制</h3><p>天子→诸侯→卿大夫→士</p><p>前771犬戎破镐京→东周始</p>";
C["spring-autumn"]="<h1>春秋</h1><p>770–476 BCE·五霸争雄。</p><table><tr><th>霸主</th><th>国</th><th>事迹</th></tr><tr><td>齐桓公</td><td>齐</td><td>首霸</td></tr><tr><td>晋文公</td><td>晋</td><td>城濮之战</td></tr><tr><td>楚庄王</td><td>楚</td><td>问鼎中原</td></tr><tr><td>阖闾</td><td>吴</td><td>破楚</td></tr><tr><td>勾践</td><td>越</td><td>卧薪尝胆</td></tr></table>";
C["warring-states"]="<h1>战国</h1><p>476–221 BCE·七雄·变法·统一</p><table><tr><th>变法</th><th>国</th></tr><tr><td>商鞅</td><td>秦(最彻底)</td></tr><tr><td>李悝</td><td>魏(最早)</td></tr></table><p><b>长平之战(260 BCE):白起坑杀40万</b></p><p>前221:秦统一·先秦终</p>";
C["confucius"]="<h1>孔子</h1><p>前551–479·鲁国·儒家创始人</p><blockquote>己所不欲,勿施于人</blockquote><p>仁·礼·弟子三千·《论语》·影响东亚两千年</p>";
C["laozi"]="<h1>老子</h1><p>李耳·道家创始人·《道德经》</p><blockquote>道可道,非常道</blockquote><p>道·无为·辩证·柔弱胜刚强</p>";
C["sun-tzu"]="<h1>孙子</h1><p>孙武·兵家鼻祖</p><h3>兵法13篇</h3><table><tr><td>1始计</td><td>2作战</td><td>3谋攻</td></tr><tr><td>五事七计</td><td>速战速决</td><td>不战屈人</td></tr></table><blockquote>知彼知己,百战不殆</blockquote>";
C["mandate-heaven"]="<h1>天命观</h1><table><tr><th>原则</th><th>含义</th></tr><tr><td>天命靡常</td><td>天命不固定</td></tr><tr><td>以德配天</td><td>有德才配</td></tr></table><blockquote>皇天无亲,惟德是辅</blockquote>";
C["feudal-system"]="<h1>封建制</h1><p>封土建国·天子→诸侯→卿大夫→士</p><h3>vs 欧洲</h3><table><tr><th></th><th>周</th><th>欧洲</th></tr><tr><td>纽带</td><td>血缘+契约</td><td>契约</td></tr></table><p>春秋松动→商鞅废→秦郡县制</p>";
C["bronze-age"]="<h1>青铜文明</h1><p><b>以礼器为核心</b></p><table><tr><th>器物</th><th>特色</th></tr><tr><td>司母戊鼎</td><td>832kg</td></tr><tr><td>毛公鼎</td><td>铭文499字</td></tr><tr><td>曾侯乙编钟</td><td>65件</td></tr></table><blockquote>国之大事,在祀与戎</blockquote>";
C["hundred-schools"]="<h1>诸子百家</h1><table><tr><th>学派</th><th>创始</th><th>后世</th></tr><tr><td>儒</td><td>孔子</td><td>正统</td></tr><tr><td>道</td><td>老子</td><td>互补</td></tr><tr><td>墨</td><td>墨子</td><td>衰落</td></tr><tr><td>法</td><td>韩非</td><td>外儒内法</td></tr></table>";
C["timeline"]="<h1>先秦大事年表</h1><p><b>夏:</b>~2070BCE · <b>商:</b>~1600–1046 · <b>周:</b>1046–256</p><p><b>春秋:</b>770–476(孔子551–479)</p><p><b>战国:</b>476–221 · 商鞅356 · 长平260</p><p><b>前221:秦统一·先秦终</b></p>";
C["state-qi"]="<h1>齐</h1><p>姜太公封国·临淄·春秋首霸</p><h3>管仲改革</h3><table><tr><th>领域</th><th>内容</th></tr><tr><td>经济</td><td>官山海·盐铁专营</td></tr><tr><td>外交</td><td><b>尊王攘夷</b></td></tr></table><p>齐桓公·召陵之盟·稷下学宫·田氏代齐</p>";
C["state-jin"]="<h1>晋</h1><p>姬姓·表里山河·晋文公称霸</p><h3>三家分晋</h3><p>六卿→四卿→<b>前453韩赵魏灭智氏</b><br>前403:周册命三晋为诸侯(<b>战国开端</b>)</p><blockquote>司马光以三家分晋为《资治通鉴》开篇</blockquote>";
C["state-chu"]="<h1>楚</h1><p>南方大国·自称王·疆域最广</p><h3>楚庄王</h3><p>一鸣惊人·<b>问鼎中原</b>·邲之战败晋</p><h3>文化</h3><p>楚辞(屈原《离骚》)·老子为楚人·凤鸟崇拜</p><p>前223被秦灭</p>";
C["state-qin"]="<h1>秦</h1><p>西陲→统一天下</p><h3>商鞅变法(356 BCE)</h3><p>军功授爵·废井田开阡陌·县制·什伍连坐</p><p><b>统一:</b>前230韩→228赵→225魏→223楚→222燕→<b>前221齐·天下统一</b></p>";
C["state-lu"]="<h1>鲁</h1><p>周公封国·曲阜·礼乐之邦</p><blockquote>周礼尽在鲁矣</blockquote><p>孔子故里·儒学发源地·三桓专政·前256被楚灭</p>";
C["state-wu"]="<h1>吴</h1><p>长江下游·姑苏(苏州)</p><p><b>阖闾:</b>用伍子胥·孙武·柏举之战破楚(506 BCE)</p><p><b>夫差:</b>赦勾践·黄池争霸·前473被越灭</p><blockquote>抉吾眼县吴东门之上,以观越寇之入灭吴也——伍子胥</blockquote>";
C["state-yue"]="<h1>越</h1><p>浙江·会稽(绍兴)</p><p><b>勾践:</b>夫椒之败→入吴为质→<b>卧薪尝胆</b>→前473灭吴</p><p>北上会盟·春秋最后霸主</p><blockquote>长颈鸟喙,可与共患难,不可与共乐</blockquote>";

C["state-han"]="<h1>韩</h1><p>七雄最弱·都城新郑·前403–前230(173年)</p><h3>劲弩</h3><blockquote>天下之强弓劲弩皆从韩出</blockquote><p>宜阳铁冶·军工立国</p><h3>申不害变法</h3><p>法家<b>术</b>派·君主驾驭群臣<br>韩昭侯时15年无外患·人亡政息</p><h3>韩非</h3><p>韩国公子·法家集大成·秦王叹服</p><h3>郑国渠</h3><p>派水工郑国入秦修渠→欲疲秦,反使秦更强</p><p><b>前230:第一个被秦灭亡</b></p>";

C["state-wei"]="<h1>魏</h1><p>三家分晋·战国<b>首霸</b>·都大梁(开封)·前403–前225(178年)</p><h3>李悝变法(最早)</h3><p>废世卿世禄·《法经》首部成文法典·平籴法</p><h3>吴起·魏武卒</h3><p>精兵重甲·大战76全胜64·阴晋5万破秦50万</p><h3>转折</h3><p>桂陵之战(围魏救赵)+<b>马陵之战</b>(庞涓死此树下)→霸权崩塌</p><h3>人才流失</h3><p>商鞅→秦·孙膑→齐·张仪→秦·范雎→秦·吴起→楚<br>魏产才而秦用之</p><h3>信陵君</h3><p>前247五国联军败秦→回光返照</p><p><b>前225:王贲引黄河水灌大梁·魏亡</b></p>";

C["lord-xinling"]="<h1>信陵君 魏无忌</h1><p>魏国公子·<b>四公子中最贤</b></p><h3>🔑 窃符救赵</h3><p>侯嬴献计→如姬盗虎符→朱亥锤杀晋鄙→率八万精兵解邯郸之围</p><h3>🏆 五国合纵败秦</h3><p>前247年率五国联军大败秦军于河外</p><h3>结局</h3><p>功高震主·反间计·被夺兵权·<b>病酒而卒</b>(前243)</p><blockquote>魏之德星——司马迁</blockquote>";
C["lord-pingyuan"]="<h1>平原君 赵胜</h1><p>赵武灵王之子·三任赵相</p><h3>🌿 毛遂自荐</h3><p>出使楚国→毛遂按剑上前→说服楚王出兵救赵</p><h3>⚠️ 长平之战争议</h3><p>力主接受上党→触发长平之战→赵损40万</p><h3>🛡️ 邯郸保卫</h3><p>散家财犒赏士卒→李同率敢死队→邯郸解围</p><p>前251年<b>善终</b></p>";
C["lord-chunshen"]="<h1>春申君 黄歇</h1><p>楚国令尹·<b>唯一非王族</b>四公子</p><h3>扶立楚王</h3><p>设计让太子逃回楚国继位</p><h3>🏙️ 开发江东</h3><p>封于江东·疏浚黄歇浦(黄浦江)<br>上海简称<b>\"申\"</b>由此而来</p><h3>💀 悲惨结局</h3><p>参与后宫阴谋→李园献妹→<b>前238被斩首</b>·灭族</p><blockquote>当断不断,反受其乱——司马迁</blockquote>";
