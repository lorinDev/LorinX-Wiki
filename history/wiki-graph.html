  .attr("r",function(d){return radii[d.g]||8})
  .attr("fill",function(d){return colors[d.g]||"#8b949e"})
  .attr("stroke","#0d1117").attr("stroke-width",1.5)
  .attr("opacity",function(d){return d.g=="dim"?0.15:1})
  .on("click",function(e,d){
    if(C[d.id]){
      document.getElementById("panel-title").textContent=d.t;
      document.getElementById("panel-body").innerHTML=C[d.id];
      document.getElementById("panel").classList.add("show");
    }
    e.stopPropagation();
  })
  .on("mouseover",function(e,d){
    d3.select(this).transition().duration(200).attr("r",(radii[d.g]||8)*1.5);
    link.attr("opacity",function(l){return(l.source.id===d.id||l.target.id===d.id)?1:0.02});
    node.select("circle").attr("opacity",function(n){
      if(n.id===d.id)return 1;
      for(var j=0;j<data.links.length;j++)
        if((data.links[j].source.id===d.id&&data.links[j].target.id===n.id)||(data.links[j].target.id===d.id&&data.links[j].source.id===n.id))return 0.6;
      return 0.03;
    });
    tooltip.style("display","block").html("<b>"+d.t+"</b><br><span style='color:#8b949e'>"+(d.d||"")+"</span>");
  })
  .on("mousemove",function(e){tooltip.style("left",(e.pageX+12)+"px").style("top",(e.pageY-40)+"px")})
  .on("mouseout",function(){
    d3.select(this).transition().duration(200).attr("r",function(d){return radii[d.g]||8});
    link.attr("opacity",function(d){return d.type=="r"?0.3:d.type=="l2"?0.7:d.type=="j"?0.5:0.5});
    node.select("circle").attr("opacity",function(d){return d.g=="dim"?0.15:1});
    tooltip.style("display","none");
  });

node.append("text")
  .text(function(d){return d.t})
  .attr("dy",function(d){return(radii[d.g]||8)+12}).attr("text-anchor","middle")
  .attr("fill","#c9d1d9").attr("font-size",function(d){return d.g=="state"||d.g=="thinker"||d.g=="reformer"||d.g=="military"||d.g=="battle"?"9":"11"})
  .attr("font-weight",function(d){return d.g=="lord"||d.g=="emperor"?"bold":"normal"});

d3.select("svg").on("click",function(){document.getElementById("panel").classList.remove("show");});
function closePanel(){document.getElementById("panel").classList.remove("show");}

sim.on("tick",function(){
  link.attr("x1",function(d){return d.source.x}).attr("y1",function(d){return d.source.y})
      .attr("x2",function(d){return d.target.x}).attr("y2",function(d){return d.target.y});
  node.attr("transform",function(d){return"translate("+d.x+","+d.y+")"});
});
</script>
</body>
</html>
